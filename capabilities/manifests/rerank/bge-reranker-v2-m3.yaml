api_version: rvbbit.capability/v1
kind: hf_backend
name: bge_reranker_v2_m3
title: BGE Reranker v2 M3
description: Cross-encoder relevance scoring for query/document pairs.
license: mit
tags: [rerank, retrieval, relevance, gpu, row]
source:
  provider: huggingface
  model: BAAI/bge-reranker-v2-m3
  url: https://huggingface.co/BAAI/bge-reranker-v2-m3
runtime:
  template: hf-rvbbit-fastapi
  handler: sequence_classification
  device: auto
backend:
  name: rerank_bge_m3
  transport: rvbbit
  batch_size: 16
  max_concurrent: 4
  timeout_ms: 120000
  description: BGE reranker v2 M3 pair relevance scorer.
operators:
  - name: rerank_score
    description: Score how relevant text is to a query using BGE reranker v2 M3.
    arg_names: [query, text]
    arg_types: [text, text]
    return_type: jsonb
    parser: json
    inputs:
      query: "{{ inputs.query }}"
      text: "{{ inputs.text }}"
  - name: rerank_row
    description: Score how relevant a JSONB row is to a query using BGE reranker v2 M3.
    arg_names: [query, row]
    arg_types: [text, jsonb]
    return_type: jsonb
    parser: json
    inputs:
      query: "{{ inputs.query }}"
      text: "{{ inputs.row }}"
smoke:
  inputs:
    - query: refund request
      text: customer says they were charged twice and wants money back
      row: '{"ticket":"charged twice","requested_action":"refund","customer_tone":"angry"}'
