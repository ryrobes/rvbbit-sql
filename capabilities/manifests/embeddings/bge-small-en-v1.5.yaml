api_version: rvbbit.capability/v1
kind: hf_backend
name: bge_small_en_v1_5
title: BGE Small English Embeddings
description: CPU-friendly English sentence embeddings exposed as an Rvbbit backend.
license: mit
tags: [embedding, retrieval, cpu-friendly]
source:
  provider: huggingface
  model: BAAI/bge-small-en-v1.5
  url: https://huggingface.co/BAAI/bge-small-en-v1.5
runtime:
  template: hf-rvbbit-fastapi
  handler: embedding
  device: auto
backend:
  name: embed_bge_small
  transport: rvbbit
  batch_size: 128
  max_concurrent: 2
  timeout_ms: 120000
  description: BAAI/bge-small-en-v1.5 sentence embeddings.
operators:
  - name: embed_bge_small
    description: Return a bge-small-en-v1.5 embedding as JSON for exploratory use. Prefer rvbbit.embed for production retrieval workflows.
    arg_names: [text]
    arg_types: [text]
    return_type: jsonb
    parser: json
    inputs:
      text: "{{ inputs.text }}"
smoke:
  inputs:
    - text: refund request from angry customer
  sql:
    - "SELECT jsonb_array_length(rvbbit.embed_bge_small('hello world'));"
