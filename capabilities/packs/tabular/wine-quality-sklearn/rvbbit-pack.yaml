api_version: rvbbit.pack/v1
id: tabular/wine-quality-sklearn
name: wine_quality_sklearn
title: Wine Quality Classifier
description: Scikit-learn tabular classification example that predicts red wine quality classes from numeric
  row features.
license: unknown
tags:
- tabular
- classify
- prediction
- row
- sklearn
- demo
capability: capability.yaml
source:
  provider: huggingface
  model: julien-c/wine-quality
  url: https://huggingface.co/julien-c/wine-quality
runtime:
  mode: build
  template: hf-rvbbit-fastapi
  handler: tabular_classification
  device: cpu
exports:
  backend: predict_wine_quality_sklearn
  operators:
  - predict_wine_quality
install:
  mode: build
  warren: true
  docker: true
acceptance:
  target_selector:
    capability: true
    docker: true
  tests:
  - name: wine_quality_prediction_shape
    description: Predict a red-wine feature row and assert classifier JSON output.
    sql: |
      DO $$
      DECLARE
          result jsonb;
          started timestamptz := clock_timestamp();
      BEGIN
          LOOP
              SELECT rvbbit.predict_wine_quality(
                  '{"fixed acidity":7.4,"volatile acidity":0.7,"citric acid":0.0,"residual sugar":1.9,"chlorides":0.076,"free sulfur dioxide":11,"total sulfur dioxide":34,"density":0.9978,"pH":3.51,"sulphates":0.56,"alcohol":9.4}'::jsonb
              ) INTO result;
              EXIT WHEN result IS NOT NULL;
              IF clock_timestamp() - started > interval '2 minutes' THEN
                  RAISE EXCEPTION 'predict_wine_quality returned NULL after readiness window';
              END IF;
              PERFORM pg_sleep(2);
          END LOOP;

          IF jsonb_typeof(result) <> 'object'
             OR NOT (result ? 'label')
             OR NOT (result ? 'prediction') THEN
              RAISE EXCEPTION 'unexpected wine prediction shape: %', result;
          END IF;
      END
      $$;
