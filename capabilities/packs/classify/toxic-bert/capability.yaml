api_version: rvbbit.capability/v1
kind: hf_backend
name: toxic_bert
title: Toxicity Classifier
description: Multi-label toxicity classifier for moderation, support triage, and data quality workflows.
license: apache-2.0
tags: [classify, toxicity, moderation, multilabel, tabular, row]
source:
  provider: huggingface
  model: unitary/toxic-bert
  url: https://huggingface.co/unitary/toxic-bert
runtime:
  template: hf-rvbbit-fastapi
  handler: sequence_classification
  device: auto
  env:
    RVBBIT_SEQUENCE_MODE: sigmoid
backend:
  name: classify_toxic_bert
  transport: rvbbit
  batch_size: 32
  max_concurrent: 4
  timeout_ms: 120000
  description: Multi-label toxic-bert classifier.
operators:
  - name: classify_toxicity
    description: Return toxicity category scores for text.
    arg_names: [text]
    arg_types: [text]
    return_type: jsonb
    parser: json
    inputs:
      text: "{{ inputs.text }}"
  - name: classify_row_toxicity
    description: Return toxicity category scores for a JSONB row.
    arg_names: [row]
    arg_types: [jsonb]
    return_type: jsonb
    parser: json
    inputs:
      text: "{{ inputs.row }}"
  - name: toxicity
    description: Canonical toxicity label backed by toxic-bert.
    arg_names: [text]
    arg_types: [text]
    return_type: text
    parser: strip
    steps:
      - name: classify
        kind: specialist
        specialist: classify_toxic_bert
        inputs:
          text: "{{ inputs.text }}"
      - name: label
        kind: code
        fn: json_get
        inputs:
          value: "{{ steps.classify.output }}"
          path: label
          default: non-toxic
  - name: toxicity_score
    description: Confidence score for the top toxicity category.
    arg_names: [text]
    arg_types: [text]
    return_type: float8
    parser: score_0_1
    steps:
      - name: classify
        kind: specialist
        specialist: classify_toxic_bert
        inputs:
          text: "{{ inputs.text }}"
      - name: score
        kind: code
        fn: json_get
        inputs:
          value: "{{ steps.classify.output }}"
          path: score
          default: 0
smoke:
  inputs:
    - text: you are awful and nobody wants you here
      row: '{"comment":"you are awful","channel":"support_chat"}'
