api_version: rvbbit.pack/v1
id: classify/deberta-v3-base-zero-shot
name: deberta_v3_base_zero_shot
title: DeBERTa v3 Base Zero-Shot Classifier
description: Smaller NLI zero-shot classifier for classifying text or JSONB rows into caller-provided
  labels.
license: mit
tags:
- classify
- zero-shot
- nli
- row
- cpu-friendly
capability: capability.yaml
source:
  provider: huggingface
  model: MoritzLaurer/deberta-v3-base-zeroshot-v2.0
  url: https://huggingface.co/MoritzLaurer/deberta-v3-base-zeroshot-v2.0
runtime:
  mode: build
  template: hf-rvbbit-fastapi
  handler: zero_shot_classification
  device: auto
exports:
  backend: classify_deberta_base_zero_shot
  operators:
  - classify_zero_shot_base
  - classify_row_zero_shot_base
install:
  mode: build
  warren: true
  docker: true
acceptance:
  target_selector:
    capability: true
    docker: true
  tests:
  - name: zero_shot_support_triage
    description: Classify support tickets into caller-provided labels and assert the zero-shot JSON shape.
    sql: |
      DO $$
      DECLARE
          result jsonb;
          started timestamptz := clock_timestamp();
      BEGIN
          LOOP
              SELECT rvbbit.classify_zero_shot_base(
                  'customer cannot log in after the MFA reset',
                  'auth,billing,shipping,fraud'
              ) INTO result;
              EXIT WHEN result IS NOT NULL;
              IF clock_timestamp() - started > interval '2 minutes' THEN
                  RAISE EXCEPTION 'classify_zero_shot_base returned NULL after readiness window';
              END IF;
              PERFORM pg_sleep(2);
          END LOOP;

          IF jsonb_typeof(result) <> 'object'
             OR NOT (result ? 'label')
             OR NOT (result ? 'score')
             OR NOT (result ? 'scores') THEN
              RAISE EXCEPTION 'unexpected zero-shot result shape: %', result;
          END IF;
          IF NOT (result->>'label' = ANY (ARRAY['auth','billing','shipping','fraud'])) THEN
              RAISE EXCEPTION 'zero-shot label was outside candidate set: %', result;
          END IF;
      END
      $$;
