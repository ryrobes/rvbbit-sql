api_version: rvbbit.capability/v1
kind: hf_backend
name: deberta_v3_zero_shot
title: DeBERTa v3 Zero-Shot Classifier
description: NLI-based zero-shot classification over caller-provided labels.
license: mit
tags: [classify, zero-shot, nli, row]
source:
  provider: huggingface
  model: MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli
  url: https://huggingface.co/MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli
runtime:
  template: hf-rvbbit-fastapi
  handler: zero_shot_classification
  device: auto
backend:
  name: classify_deberta_zero_shot
  transport: rvbbit
  batch_size: 16
  max_concurrent: 4
  timeout_ms: 120000
  description: DeBERTa v3 NLI zero-shot classifier.
operators:
  - name: classify_zero_shot
    description: Classify text into comma-separated categories using DeBERTa v3 zero-shot NLI.
    arg_names: [text, categories]
    arg_types: [text, text]
    return_type: jsonb
    parser: json
    inputs:
      text: "{{ inputs.text }}"
      labels: "{{ inputs.categories }}"
  - name: classify_row_zero_shot
    description: Classify a JSONB row into comma-separated categories using DeBERTa v3 zero-shot NLI.
    arg_names: [row, categories]
    arg_types: [jsonb, text]
    return_type: jsonb
    parser: json
    inputs:
      text: "{{ inputs.row }}"
      labels: "{{ inputs.categories }}"
smoke:
  inputs:
    - text: the delivery arrived late and the customer wants a refund
      categories: billing, shipping, product_quality, cancellation
      row: '{"ticket":"delivery arrived late","customer_tone":"angry","requested_action":"refund"}'
