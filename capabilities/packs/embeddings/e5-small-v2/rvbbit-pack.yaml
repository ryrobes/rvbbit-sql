api_version: rvbbit.pack/v1
id: embeddings/e5-small-v2
name: e5_small_v2
title: E5 Small Embeddings
description: Small, fast E5 embeddings useful for CPU-friendly retrieval experiments and lightweight semantic
  joins.
license: mit
tags:
- embedding
- retrieval
- cpu-friendly
- semantic-join
capability: capability.yaml
source:
  provider: huggingface
  model: intfloat/e5-small-v2
  url: https://huggingface.co/intfloat/e5-small-v2
runtime:
  mode: build
  template: hf-rvbbit-fastapi
  handler: embedding
  device: auto
exports:
  backend: embed_e5_small
  operators:
  - embed_e5_small
install:
  mode: build
  warren: true
  docker: true
