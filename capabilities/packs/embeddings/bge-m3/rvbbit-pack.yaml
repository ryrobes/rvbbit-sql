api_version: rvbbit.pack/v1
id: embeddings/bge-m3
name: bge_m3
title: BGE-M3 Embeddings
description: High-quality multilingual BGE-M3 sentence embeddings for retrieval and semantic search.
license: mit
tags:
- embedding
- retrieval
- multilingual
- gpu
capability: capability.yaml
source:
  provider: huggingface
  model: BAAI/bge-m3
  url: https://huggingface.co/BAAI/bge-m3
runtime:
  mode: build
  template: hf-rvbbit-fastapi
  handler: embedding
  device: auto
resources:
  gpu:
    required: false
    placement: single_gpu
    model_size_bytes: 2273250020
    vram_required_bytes: 2841562525
    headroom_pct: 25
    estimate_source: huggingface_weights
exports:
  backend: embed_bge_m3
  operators:
  - embed_bge_m3
  - semantic_embed
  - similar_to
install:
  mode: build
  warren: true
  docker: true
acceptance:
  target_selector:
    capability: true
    docker: true
  tests:
  - name: embedding_vector_shape
    description: Embed realistic retrieval text and assert a non-empty vector payload.
    sql: |
      DO $$
      DECLARE
          result jsonb;
          score float8;
          started timestamptz := clock_timestamp();
      BEGIN
          LOOP
              SELECT rvbbit.embed_bge_m3('query: suspicious movement near a wooded creek') INTO result;
              EXIT WHEN result IS NOT NULL;
              IF clock_timestamp() - started > interval '2 minutes' THEN
                  RAISE EXCEPTION 'embed_bge_m3 returned NULL after readiness window';
              END IF;
              PERFORM pg_sleep(2);
          END LOOP;

          IF jsonb_typeof(result) <> 'array' OR jsonb_array_length(result) < 16 THEN
              RAISE EXCEPTION 'unexpected BGE-M3 embedding shape: %', left(result::text, 200);
          END IF;

          SELECT rvbbit.semantic_embed('query: suspicious movement near a wooded creek') INTO result;
          IF jsonb_typeof(result) <> 'array' OR jsonb_array_length(result) < 16 THEN
              RAISE EXCEPTION 'unexpected semantic_embed BGE-M3 shape: %', left(result::text, 200);
          END IF;

          SELECT rvbbit.similar_to(
              'refund request from angry customer',
              'customer wants money back after duplicate charge'
          ) INTO score;
          IF score < 0 OR score > 1 THEN
              RAISE EXCEPTION 'bundled similar_to score out of range: %', score;
          END IF;
      END
      $$;
