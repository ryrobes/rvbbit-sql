api_version: rvbbit.capability/v1
kind: runtime_sidecar
name: hindsight_slim
title: Hindsight Memory Service
description: Hindsight API service for agent long-term memory, backed by a dedicated schema in the RVBBIT Postgres database and RVBBIT-compatible embedding config where possible.
license: provider
system_runtime: false
capability_role: system_runtime
tags: [memory, agent-memory, hindsight, hermes, warren, postgres, embeddings, cpu]
source:
  provider: builtin
  model: vectorize-io/hindsight-api-slim
  url: https://github.com/vectorize-io/hindsight
runtime:
  mode: image
  template: runtime-sidecar
  image: ghcr.io/vectorize-io/hindsight-api:latest-slim
  pull_policy: missing
  language: memory
  handler: custom
  device: cpu
  port: 8888
  publish_host_port: true
  host_bind: 127.0.0.1
  host_port: 8888
  host_port_env: RVBBIT_HINDSIGHT_PORT
  health_path: /health
  env:
    HINDSIGHT_API_HOST: 0.0.0.0
    HINDSIGHT_API_PORT: "8888"
    HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_API_LLM_PROVIDER:-${RVBBIT_HINDSIGHT_LLM_PROVIDER:-none}}
    HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_API_LLM_API_KEY:-${OPENAI_API_KEY:-}}
    HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_API_LLM_MODEL:-${RVBBIT_HINDSIGHT_LLM_MODEL:-gpt-5-mini}}
    HINDSIGHT_API_LLM_BASE_URL: ${HINDSIGHT_API_LLM_BASE_URL:-}
    HINDSIGHT_API_LLM_TRACE_ENABLED: ${HINDSIGHT_API_LLM_TRACE_ENABLED:-false}
    HINDSIGHT_API_EMBEDDINGS_PROVIDER: ${HINDSIGHT_API_EMBEDDINGS_PROVIDER:-${RVBBIT_HINDSIGHT_EMBEDDINGS_PROVIDER:-openai}}
    HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY:-${OPENAI_API_KEY:-${HINDSIGHT_API_LLM_API_KEY:-}}}
    HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL:-${RVBBIT_HINDSIGHT_EMBEDDINGS_MODEL:-text-embedding-3-small}}
    HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL:-${RVBBIT_HINDSIGHT_EMBEDDINGS_BASE_URL:-}}
    HINDSIGHT_API_EMBEDDINGS_OPENROUTER_API_KEY: ${HINDSIGHT_API_EMBEDDINGS_OPENROUTER_API_KEY:-${OPENROUTER_API_KEY:-}}
    HINDSIGHT_API_EMBEDDINGS_OPENROUTER_MODEL: ${HINDSIGHT_API_EMBEDDINGS_OPENROUTER_MODEL:-${RVBBIT_HINDSIGHT_EMBEDDINGS_OPENROUTER_MODEL:-perplexity/pplx-embed-v1-0.6b}}
    HINDSIGHT_API_AUDIT_LOG_ENABLED: ${HINDSIGHT_API_AUDIT_LOG_ENABLED:-true}
    HINDSIGHT_API_RERANKER_PROVIDER: ${HINDSIGHT_API_RERANKER_PROVIDER:-${RVBBIT_HINDSIGHT_RERANKER_PROVIDER:-rrf}}
    HINDSIGHT_API_WORKER_ID: ${HINDSIGHT_API_WORKER_ID:-rvbbit-hindsight}
    HINDSIGHT_API_DATABASE_SCHEMA: ${HINDSIGHT_API_DATABASE_SCHEMA:-hindsight}
runtime_registration:
  name: hindsight_default
  language: memory
  provider: hindsight
  endpoint_path: /
  set_default: true
  labels:
    language: memory
    provider: hindsight
    capability_kind: runtime_sidecar
    runtime_handler: hindsight
    agent_memory: true
warren:
  endpoint_path: /
  health_path: /health
  service_provider: hindsight
  postgres_database:
    mode: schema
    schema: hindsight
    create: true
    extensions: [vector]
    url_env: HINDSIGHT_API_DATABASE_URL
    schema_env: HINDSIGHT_API_DATABASE_SCHEMA
  embedding_env_from:
    backend: embed
    required: false
smoke:
  sql:
    - |
      DO $$
      BEGIN
          IF NOT EXISTS (SELECT 1 FROM pg_extension WHERE extname = 'vector') THEN
              RAISE EXCEPTION 'Hindsight requires the pgvector extension (CREATE EXTENSION vector)';
          END IF;
          IF to_regnamespace('hindsight') IS NULL THEN
              RAISE EXCEPTION 'Hindsight schema hindsight was not created in database %', current_database();
          END IF;
      END
      $$;
    - "SELECT name, provider, endpoint_url, status FROM rvbbit.memory_services WHERE name = 'hindsight_default';"
    - |
      DO $$
      DECLARE
          probe jsonb;
          started timestamptz := clock_timestamp();
          last_error text;
      BEGIN
          IF to_regprocedure('rvbbit.hindsight_status(text)') IS NULL THEN
              RAISE EXCEPTION 'rvbbit.hindsight_status(text) is not installed; redeploy pg_rvbbit 2.7.0+ and run SELECT rvbbit.migrate() before installing hindsight_slim';
          END IF;

          LOOP
              BEGIN
                  SELECT rvbbit.hindsight_status('hindsight_default') INTO probe;
                  EXIT WHEN probe IS NOT NULL;
                  last_error := 'rvbbit.hindsight_status returned NULL';
              EXCEPTION WHEN OTHERS THEN
                  last_error := SQLERRM;
              END;

              IF clock_timestamp() - started > interval '2 minutes' THEN
                  RAISE EXCEPTION 'rvbbit.hindsight_status did not become ready within 2 minutes: %',
                      coalesce(last_error, 'unknown error');
              END IF;
              PERFORM pg_sleep(2);
          END LOOP;
      END
      $$;
operators:
  - name: hindsight_memory_status
    description: Probe the configured Hindsight memory service and return its health payload.
    arg_names: [service_name]
    arg_types: [text]
    return_type: jsonb
    parser: json
    cache_policy: never
    steps:
      - name: status
        kind: sql
        sql: "SELECT rvbbit.hindsight_status($1) AS result"
        params:
          - "{{ inputs.service_name }}"
      - name: result
        kind: code
        fn: json_get
        inputs:
          value: "{{ steps.status.output }}"
          path: result
          default: {}
  - name: hindsight_memory_retain
    description: Store content in a Hindsight memory bank through the registered memory service.
    arg_names: [bank_id, content, options, service_name, async_mode]
    arg_types: [text, text, jsonb, text, bool]
    return_type: jsonb
    parser: json
    cache_policy: never
    steps:
      - name: retain
        kind: sql
        sql: "SELECT rvbbit.hindsight_retain($1, $2, $3::jsonb, $4, $5::bool) AS result"
        params:
          - "{{ inputs.bank_id }}"
          - "{{ inputs.content }}"
          - "{{ inputs.options }}"
          - "{{ inputs.service_name }}"
          - "{{ inputs.async_mode }}"
      - name: result
        kind: code
        fn: json_get
        inputs:
          value: "{{ steps.retain.output }}"
          path: result
          default: {}
  - name: hindsight_memory_recall
    description: Search a Hindsight memory bank for memories relevant to a query.
    arg_names: [bank_id, query, options, service_name]
    arg_types: [text, text, jsonb, text]
    return_type: jsonb
    parser: json
    cache_policy: never
    steps:
      - name: recall
        kind: sql
        sql: "SELECT rvbbit.hindsight_recall($1, $2, $3::jsonb, $4) AS result"
        params:
          - "{{ inputs.bank_id }}"
          - "{{ inputs.query }}"
          - "{{ inputs.options }}"
          - "{{ inputs.service_name }}"
      - name: result
        kind: code
        fn: json_get
        inputs:
          value: "{{ steps.recall.output }}"
          path: result
          default: {}
  - name: hindsight_memory_reflect
    description: Ask Hindsight to synthesize context from a memory bank for a query.
    arg_names: [bank_id, query, options, service_name]
    arg_types: [text, text, jsonb, text]
    return_type: jsonb
    parser: json
    cache_policy: never
    steps:
      - name: reflect
        kind: sql
        sql: "SELECT rvbbit.hindsight_reflect($1, $2, $3::jsonb, $4) AS result"
        params:
          - "{{ inputs.bank_id }}"
          - "{{ inputs.query }}"
          - "{{ inputs.options }}"
          - "{{ inputs.service_name }}"
      - name: result
        kind: code
        fn: json_get
        inputs:
          value: "{{ steps.reflect.output }}"
          path: result
          default: {}
