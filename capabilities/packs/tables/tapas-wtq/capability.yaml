api_version: rvbbit.capability/v1
kind: hf_backend
name: tapas_wtq_table_qa
title: TAPAS Table Question Answering
description: Local question answering over small JSONB tables for BI-style table exploration.
license: apache-2.0
tags: [tables, qa, bi, analytics, jsonb, row]
source:
  provider: huggingface
  model: google/tapas-base-finetuned-wtq
  url: https://huggingface.co/google/tapas-base-finetuned-wtq
runtime:
  template: hf-rvbbit-fastapi
  handler: table_question_answering
  device: auto
backend:
  name: table_qa_tapas
  transport: rvbbit
  batch_size: 8
  max_concurrent: 2
  timeout_ms: 180000
  description: TAPAS table question-answering backend.
operators:
  - name: answer_table_question
    description: Answer a question over a small JSONB table.
    arg_names: [table, question]
    arg_types: [jsonb, text]
    return_type: jsonb
    parser: json
    inputs:
      table: "{{ inputs.table }}"
      question: "{{ inputs.question }}"
  - name: table_answer_text
    description: Return only the answer text for a question over a small JSONB table.
    arg_names: [table, question]
    arg_types: [jsonb, text]
    return_type: text
    parser: strip
    steps:
      - name: qa
        kind: specialist
        specialist: table_qa_tapas
        inputs:
          table: "{{ inputs.table }}"
          question: "{{ inputs.question }}"
      - name: answer
        kind: code
        fn: json_get
        inputs:
          value: "{{ steps.qa.output }}"
          path: answer
          default: ""
smoke:
  inputs:
    - table: '[{"region":"West","revenue":"120"},{"region":"East","revenue":"80"}]'
      question: Which region has revenue 120?
