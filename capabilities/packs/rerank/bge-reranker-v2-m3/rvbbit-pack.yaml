api_version: rvbbit.pack/v1
id: rerank/bge-reranker-v2-m3
name: bge_reranker_v2_m3
title: BGE Reranker v2 M3
description: Cross-encoder relevance scoring for query/document pairs.
license: mit
tags:
- rerank
- retrieval
- relevance
- gpu
- row
capability: capability.yaml
source:
  provider: huggingface
  model: BAAI/bge-reranker-v2-m3
  url: https://huggingface.co/BAAI/bge-reranker-v2-m3
runtime:
  mode: build
  template: hf-rvbbit-fastapi
  handler: sequence_classification
  device: auto
exports:
  backend: rerank_bge_m3
  operators:
  - rerank_score
  - rerank_row
install:
  mode: build
  warren: true
  docker: true
acceptance:
  target_selector:
    capability: true
    docker: true
  tests:
  - name: rerank_score_shape
    description: Score refund-query relevance and assert a bounded score.
    sql: |
      DO $$
      DECLARE
          result jsonb;
          started timestamptz := clock_timestamp();
      BEGIN
          LOOP
              SELECT rvbbit.rerank_score(
                  'refund request',
                  'customer says they were charged twice and wants money back'
              ) INTO result;
              EXIT WHEN result IS NOT NULL;
              IF clock_timestamp() - started > interval '2 minutes' THEN
                  RAISE EXCEPTION 'rerank_score returned NULL after readiness window';
              END IF;
              PERFORM pg_sleep(2);
          END LOOP;

          IF jsonb_typeof(result) <> 'object' OR NOT (result ? 'score') THEN
              RAISE EXCEPTION 'unexpected BGE-M3 reranker result shape: %', result;
          END IF;
          IF (result->>'score')::float8 < 0 OR (result->>'score')::float8 > 1 THEN
              RAISE EXCEPTION 'reranker score out of range: %', result;
          END IF;
      END
      $$;
