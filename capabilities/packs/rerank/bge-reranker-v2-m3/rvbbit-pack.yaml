api_version: rvbbit.pack/v1
id: rerank/bge-reranker-v2-m3
name: bge_reranker_v2_m3
title: BGE Reranker v2 M3
description: Cross-encoder relevance scoring for query/document pairs.
license: mit
tags:
- rerank
- retrieval
- relevance
- gpu
- row
capability: capability.yaml
source:
  provider: huggingface
  model: BAAI/bge-reranker-v2-m3
  url: https://huggingface.co/BAAI/bge-reranker-v2-m3
runtime:
  mode: build
  template: hf-rvbbit-fastapi
  handler: sequence_classification
  device: auto
exports:
  backend: rerank_bge_m3
  operators:
  - rerank_score
  - rerank_row
install:
  mode: build
  warren: true
  docker: true
