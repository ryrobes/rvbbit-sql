api_version: rvbbit.capability/v1
kind: hf_backend
name: bge_reranker_base
title: BGE Reranker Base
description: Smaller BGE cross-encoder reranker for query/document scoring and row ranking.
license: mit
tags: [rerank, retrieval, relevance, row, cpu-friendly]
source:
  provider: huggingface
  model: BAAI/bge-reranker-base
  url: https://huggingface.co/BAAI/bge-reranker-base
runtime:
  template: hf-rvbbit-fastapi
  handler: sequence_classification
  device: auto
backend:
  name: rerank_bge_base
  transport: rvbbit
  batch_size: 24
  max_concurrent: 4
  timeout_ms: 120000
  description: BGE reranker base pair relevance scorer.
operators:
  - name: rerank_bge_base_score
    description: Score how relevant text is to a query using BGE reranker base.
    arg_names: [query, text]
    arg_types: [text, text]
    return_type: jsonb
    parser: json
    inputs:
      query: "{{ inputs.query }}"
      text: "{{ inputs.text }}"
  - name: rerank_bge_base_row
    description: Score how relevant a JSONB row is to a query using BGE reranker base.
    arg_names: [query, row]
    arg_types: [text, jsonb]
    return_type: jsonb
    parser: json
    inputs:
      query: "{{ inputs.query }}"
      text: "{{ inputs.row }}"
  - name: about
    description: Relevance score in [0,1] of text to a topic, backed by BGE reranker base.
    arg_names: [text, topic]
    arg_types: [text, text]
    return_type: float8
    parser: score_0_1
    infix_symbol: "~~%"
    infix_word: ABOUT
    steps:
      - name: rerank
        kind: specialist
        specialist: rerank_bge_base
        inputs:
          query: "{{ inputs.topic }}"
          text: "{{ inputs.text }}"
      - name: score
        kind: code
        fn: json_get
        inputs:
          value: "{{ steps.rerank.output }}"
          path: score
          default: 0
  - name: semantic_score
    description: Score how relevant text is to a semantic criterion.
    arg_names: [text, criterion]
    arg_types: [text, text]
    return_type: float8
    parser: score_0_1
    steps:
      - name: rerank
        kind: specialist
        specialist: rerank_bge_base
        inputs:
          query: "{{ inputs.criterion }}"
          text: "{{ inputs.text }}"
      - name: score
        kind: code
        fn: json_get
        inputs:
          value: "{{ steps.rerank.output }}"
          path: score
          default: 0
  - name: means
    description: True when text semantically matches a criterion using BGE reranker base.
    arg_names: [text, criterion]
    arg_types: [text, text]
    return_type: bool
    parser: yes_no
    infix_symbol: "~~?"
    infix_word: MEANS
    steps:
      - name: rerank
        kind: specialist
        specialist: rerank_bge_base
        inputs:
          query: "{{ inputs.criterion }}"
          text: "{{ inputs.text }}"
      - name: threshold
        kind: code
        fn: number_gte
        inputs:
          value: "{{ steps.rerank.output.score }}"
          threshold: "{{ opts.threshold }}"
  - name: semantic_matches
    description: True when text semantically matches a criterion using BGE reranker base.
    arg_names: [text, criterion]
    arg_types: [text, text]
    return_type: bool
    parser: yes_no
    steps:
      - name: rerank
        kind: specialist
        specialist: rerank_bge_base
        inputs:
          query: "{{ inputs.criterion }}"
          text: "{{ inputs.text }}"
      - name: threshold
        kind: code
        fn: number_gte
        inputs:
          value: "{{ steps.rerank.output.score }}"
          threshold: "{{ opts.threshold }}"
smoke:
  inputs:
    - query: suspicious login
      text: user had twelve failed logins from a new country
      topic: account takeover risk
      criterion: account takeover risk
      row: '{"event":"login_failed","count":12,"country":"new","risk":"high"}'
