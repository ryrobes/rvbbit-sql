api_version: rvbbit.pack/v1
id: rerank/ms-marco-minilm-l6-v2
name: ms_marco_minilm_l6_v2
title: MS MARCO MiniLM Reranker
description: Lightweight cross-encoder reranker for query/document scoring and ranking table rows by relevance.
license: apache-2.0
tags:
- rerank
- retrieval
- relevance
- row
- cpu-friendly
capability: capability.yaml
source:
  provider: huggingface
  model: cross-encoder/ms-marco-MiniLM-L6-v2
  url: https://huggingface.co/cross-encoder/ms-marco-MiniLM-L6-v2
runtime:
  mode: build
  template: hf-rvbbit-fastapi
  handler: sequence_classification
  device: auto
exports:
  backend: rerank_ms_marco_minilm
  operators:
  - rerank_ms_marco_score
  - rerank_ms_marco_row
  - about
  - semantic_score
  - means
  - semantic_matches
install:
  mode: build
  warren: true
  docker: true
acceptance:
  target_selector:
    capability: true
    docker: true
  tests:
  - name: rerank_score_shape
    description: Score billing-query relevance and assert a bounded score.
    sql: |
      DO $$
      DECLARE
          result jsonb;
          score float8;
          matched bool;
          started timestamptz := clock_timestamp();
      BEGIN
          LOOP
              SELECT rvbbit.rerank_ms_marco_score(
                  'billing refund',
                  'customer was charged twice and asks for their money back'
              ) INTO result;
              EXIT WHEN result IS NOT NULL;
              IF clock_timestamp() - started > interval '2 minutes' THEN
                  RAISE EXCEPTION 'rerank_ms_marco_score returned NULL after readiness window';
              END IF;
              PERFORM pg_sleep(2);
          END LOOP;

          IF jsonb_typeof(result) <> 'object' OR NOT (result ? 'score') THEN
              RAISE EXCEPTION 'unexpected MS MARCO reranker result shape: %', result;
          END IF;
          IF (result->>'score')::float8 < 0 OR (result->>'score')::float8 > 1 THEN
              RAISE EXCEPTION 'reranker score out of range: %', result;
          END IF;

          SELECT rvbbit.rerank_ms_marco_row(
              'billing refund',
              '{"ticket":"customer was charged twice and asks for their money back","queue":"billing"}'::jsonb
          ) INTO result;
          IF jsonb_typeof(result) <> 'object' OR NOT (result ? 'score') THEN
              RAISE EXCEPTION 'unexpected MS MARCO reranker row result shape: %', result;
          END IF;
          IF (result->>'score')::float8 < 0 OR (result->>'score')::float8 > 1 THEN
              RAISE EXCEPTION 'reranker row score out of range: %', result;
          END IF;

          SELECT rvbbit.about(
              'customer was charged twice and asks for their money back',
              'billing refund'
          ) INTO score;
          IF score < 0 OR score > 1 THEN
              RAISE EXCEPTION 'bundled about operator score out of range: %', score;
          END IF;

          SELECT rvbbit.semantic_score(
              'customer was charged twice and asks for their money back',
              'billing refund'
          ) INTO score;
          IF score < 0 OR score > 1 THEN
              RAISE EXCEPTION 'bundled semantic_score out of range: %', score;
          END IF;

          SELECT rvbbit.means(
              'customer was charged twice and asks for their money back',
              'billing refund'
          ) INTO matched;
          IF matched IS NULL THEN
              RAISE EXCEPTION 'bundled means operator returned NULL';
          END IF;

          SELECT rvbbit.semantic_matches(
              'customer was charged twice and asks for their money back',
              'billing refund',
              '{"threshold":0.1}'::jsonb
          ) INTO matched;
          IF matched IS NULL THEN
              RAISE EXCEPTION 'bundled semantic_matches operator returned NULL';
          END IF;
      END
      $$;
