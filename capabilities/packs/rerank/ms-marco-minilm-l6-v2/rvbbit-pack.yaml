api_version: rvbbit.pack/v1
id: rerank/ms-marco-minilm-l6-v2
name: ms_marco_minilm_l6_v2
title: MS MARCO MiniLM Reranker
description: Lightweight cross-encoder reranker for query/document scoring and ranking table rows by relevance.
license: apache-2.0
tags:
- rerank
- retrieval
- relevance
- row
- cpu-friendly
capability: capability.yaml
source:
  provider: huggingface
  model: cross-encoder/ms-marco-MiniLM-L6-v2
  url: https://huggingface.co/cross-encoder/ms-marco-MiniLM-L6-v2
runtime:
  mode: build
  template: hf-rvbbit-fastapi
  handler: sequence_classification
  device: auto
exports:
  backend: rerank_ms_marco_minilm
  operators:
  - rerank_ms_marco_score
  - rerank_ms_marco_row
install:
  mode: build
  warren: true
  docker: true
acceptance:
  target_selector:
    capability: true
    docker: true
  tests:
  - name: rerank_score_shape
    description: Score billing-query relevance and assert a bounded score.
    sql: |
      DO $$
      DECLARE
          result jsonb;
          started timestamptz := clock_timestamp();
      BEGIN
          LOOP
              SELECT rvbbit.rerank_ms_marco_score(
                  'billing refund',
                  'customer was charged twice and asks for their money back'
              ) INTO result;
              EXIT WHEN result IS NOT NULL;
              IF clock_timestamp() - started > interval '2 minutes' THEN
                  RAISE EXCEPTION 'rerank_ms_marco_score returned NULL after readiness window';
              END IF;
              PERFORM pg_sleep(2);
          END LOOP;

          IF jsonb_typeof(result) <> 'object' OR NOT (result ? 'score') THEN
              RAISE EXCEPTION 'unexpected MS MARCO reranker result shape: %', result;
          END IF;
          IF (result->>'score')::float8 < 0 OR (result->>'score')::float8 > 1 THEN
              RAISE EXCEPTION 'reranker score out of range: %', result;
          END IF;
      END
      $$;
