<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AA Market Map</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.4/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.4/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f7f8f4;
      --ink: #17211c;
      --muted: #66726c;
      --line: rgba(23, 33, 28, 0.14);
      --panel: rgba(255, 255, 255, 0.92);
      --panel-solid: #ffffff;
      --panel-soft: rgba(255, 255, 255, 0.72);
      --control-bg: rgba(23, 33, 28, 0.06);
      --location: #116d6e;
      --lead: #c6652b;
      --enrollment: #5a58a8;
      --cluster: #d14c47;
      --spend: #0f8f7d;
      --pharmacy: #287b4f;
      --shadow: 0 16px 42px rgba(32, 38, 36, 0.18);
    }

    body.dark {
      --bg: #111716;
      --ink: #f2f5ef;
      --muted: #aab4ad;
      --line: rgba(241, 246, 239, 0.18);
      --panel: rgba(19, 25, 24, 0.92);
      --panel-solid: #1a2220;
      --panel-soft: rgba(26, 34, 32, 0.78);
      --control-bg: rgba(241, 246, 239, 0.08);
      --shadow: 0 18px 46px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 320px;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    .topbar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      min-height: 56px;
      display: grid;
      grid-template-columns: minmax(190px, 1fr) auto auto auto auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      z-index: 5;
    }

    .brand {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-left: 4px;
    }

    .brand h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.1;
      font-weight: 750;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand .sub {
      font-size: 12px;
      line-height: 1.2;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .segmented,
    .toggles,
    .radius,
    .theme-control {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      background: var(--control-bg);
      border: 1px solid var(--line);
      min-height: 36px;
    }

    button,
    select {
      font: inherit;
      color: var(--ink);
    }

    .segmented button,
    .toggles button,
    .theme-toggle {
      height: 28px;
      border: 0;
      background: transparent;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 650;
      cursor: pointer;
    }

    .segmented button.active,
    .toggles button.active,
    .theme-toggle.active {
      background: var(--panel-solid);
      box-shadow: 0 1px 4px rgba(20, 26, 22, 0.14);
    }

    .toggles button[data-layer="locations"].active { color: var(--location); }
    .toggles button[data-layer="leads"].active { color: var(--lead); }
    .toggles button[data-layer="enrollments"].active { color: var(--enrollment); }
    .toggles button[data-layer="clusters"].active { color: var(--cluster); }
    .toggles button[data-layer="spend"].active { color: var(--spend); }
    .toggles button[data-layer="clouds"].active { color: var(--spend); }
    .toggles button[data-layer="cpl"].active { color: var(--lead); }

    .radius label {
      font-size: 12px;
      color: var(--muted);
      padding-left: 8px;
    }

    .radius select {
      height: 28px;
      border: 0;
      background: transparent;
      padding: 0 26px 0 6px;
      font-size: 12px;
      font-weight: 650;
      outline: 0;
      cursor: pointer;
    }

    .theme-toggle {
      min-width: 52px;
    }

    .side {
      position: absolute;
      left: 14px;
      bottom: 14px;
      width: min(410px, calc(100vw - 28px));
      max-height: calc(100vh - 98px);
      display: grid;
      gap: 10px;
      z-index: 4;
      pointer-events: none;
    }

    .stats,
    .focus {
      pointer-events: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      background: rgba(23, 33, 28, 0.12);
    }

    .stat {
      min-height: 68px;
      background: var(--panel-solid);
      padding: 12px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat .value {
      margin-top: 6px;
      font-size: 22px;
      line-height: 1;
      font-weight: 760;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .focus {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .focus h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
      font-weight: 760;
      letter-spacing: 0;
    }

    .focus .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .focus-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border: 1px solid var(--line);
      background: rgba(23, 33, 28, 0.08);
      gap: 1px;
    }

    .focus-cell {
      min-height: 58px;
      padding: 10px;
      background: var(--panel-soft);
    }

    .focus-cell span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.15;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .focus-cell strong {
      display: block;
      margin-top: 6px;
      font-size: 18px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .status {
      position: absolute;
      right: 14px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 28px));
      z-index: 6;
      padding: 10px 12px;
      background: rgba(23, 33, 28, 0.92);
      color: #fff;
      font-size: 12px;
      line-height: 1.35;
      box-shadow: var(--shadow);
      display: none;
    }

    .status.show { display: block; }

    .mapboxgl-popup-content {
      padding: 10px 12px;
      color: var(--ink);
      background: var(--panel-solid);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    .popup-stack {
      display: grid;
      gap: 8px;
      max-width: 330px;
    }

    .popup-item {
      display: grid;
      gap: 3px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    .popup-item:first-child {
      padding-top: 0;
      border-top: 0;
    }

    .popup-kicker {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .popup-title {
      font-size: 13px;
      font-weight: 760;
      line-height: 1.25;
      margin-bottom: 4px;
    }

    .popup-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .insights {
      position: absolute;
      top: 84px;
      right: 14px;
      width: min(390px, calc(100vw - 28px));
      max-height: calc(100vh - 112px);
      display: grid;
      gap: 10px;
      padding: 12px;
      z-index: 4;
      pointer-events: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      overflow: auto;
    }

    .insights-head {
      display: grid;
      gap: 3px;
    }

    .insights-head h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
      font-weight: 760;
      letter-spacing: 0;
    }

    .insights-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .chart-box {
      height: 100px;
      min-height: 100px;
      padding: 8px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .chart-box.compact {
      height: 86px;
      min-height: 86px;
    }

    .demand-grid {
      min-height: 0;
      overflow: auto;
      border: 1px solid var(--line);
      background: rgba(23, 33, 28, 0.08);
    }

    .demand-row {
      width: 100%;
      min-height: 30px;
      display: grid;
      grid-template-columns: minmax(104px, 1.2fr) minmax(42px, 0.45fr) minmax(58px, 0.65fr) minmax(58px, 0.65fr) minmax(62px, 0.7fr);
      align-items: center;
      gap: 1px;
      border: 0;
      border-bottom: 1px solid var(--line);
      padding: 0;
      background: var(--panel-soft);
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .demand-row.header {
      min-height: 26px;
      cursor: default;
      color: var(--muted);
      background: var(--panel-solid);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 10px;
      font-weight: 700;
    }

    .demand-row:last-child {
      border-bottom: 0;
    }

    .demand-row span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 5px 7px;
      font-size: 10.5px;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }

    .signal-chip {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .topbar {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .segmented,
      .toggles,
      .radius,
      .theme-control {
        width: 100%;
        justify-content: space-between;
      }

      .side {
        left: 10px;
        right: 10px;
        bottom: 10px;
        width: auto;
      }

      .stats,
      .focus-grid {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .stat,
      .focus-cell {
        padding: 9px;
      }

      .stat .value {
        font-size: 18px;
      }

      .insights {
        display: none;
      }
    }

    @media (max-width: 1180px) {
      .insights {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>
    <div class="topbar">
      <div class="brand">
        <h1>AA Market Map</h1>
        <div class="sub" id="subtitle">Loading warehouse layers</div>
      </div>
      <div class="segmented" aria-label="Course type">
        <button data-course="all" class="active">All</button>
        <button data-course="dental">Dental</button>
        <button data-course="pharmacy">Pharmacy</button>
      </div>
      <div class="toggles" aria-label="Map layers">
        <button data-layer="locations" class="active">Locations</button>
        <button data-layer="leads" class="active">Leads</button>
        <button data-layer="enrollments" class="active">Enrollments</button>
        <button data-layer="clusters" class="active">Clusters</button>
        <button data-layer="spend" class="active">Spend</button>
        <button data-layer="clouds" class="active">Clouds</button>
        <button data-layer="cpl" class="active">CPL</button>
      </div>
      <div class="radius">
        <label for="radiusMiles">Radius</label>
        <select id="radiusMiles">
          <option value="10">10 mi</option>
          <option value="25" selected>25 mi</option>
          <option value="50">50 mi</option>
          <option value="100">100 mi</option>
        </select>
      </div>
      <div class="theme-control">
        <button class="theme-toggle" id="themeToggle" type="button" aria-pressed="false">Dark</button>
      </div>
    </div>

    <div class="side">
      <div class="stats">
        <div class="stat"><div class="label">Locations</div><div class="value" id="statLocations">0</div></div>
        <div class="stat"><div class="label">Leads</div><div class="value" id="statLeads">0</div></div>
        <div class="stat"><div class="label">Enrollments</div><div class="value" id="statEnrollments">0</div></div>
        <div class="stat"><div class="label">Opportunity</div><div class="value" id="statOpportunity">0</div></div>
      </div>
      <div class="focus" id="focusPanel">
        <h2 id="focusTitle">Market radius</h2>
        <div class="meta" id="focusMeta">No location selected</div>
        <div class="focus-grid">
          <div class="focus-cell"><span>Courses</span><strong id="focusCourses">0</strong></div>
          <div class="focus-cell"><span>Leads</span><strong id="focusLeads">0</strong></div>
          <div class="focus-cell"><span>Enrollments</span><strong id="focusEnrollments">0</strong></div>
          <div class="focus-cell"><span>Opportunity</span><strong id="focusOpportunity">0</strong></div>
        </div>
      </div>
    </div>

    <div class="insights" id="insightsPanel">
      <div class="insights-head">
        <h2>Demand signals</h2>
        <div class="insights-meta" id="insightsMeta">Loading clusters</div>
      </div>
      <div class="chart-box">
        <canvas id="signalChart"></canvas>
      </div>
      <div class="demand-grid" id="demandGrid"></div>
      <div class="insights-head">
        <h2>Spend actions</h2>
        <div class="insights-meta" id="spendMeta">Loading paid media</div>
      </div>
      <div class="chart-box compact">
        <canvas id="channelChart"></canvas>
      </div>
      <div class="demand-grid" id="spendGrid"></div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const state = {
      course: "all",
      layers: { locations: true, leads: true, enrollments: true, clusters: true, spend: true, clouds: true, cpl: true },
      raw: { locations: [], leads: [], enrollments: [], clusters: [], spend: [], clouds: [], cplClouds: [] },
      filtered: { locations: [], leads: [], enrollments: [], clusters: [], spend: [], clouds: [], cplClouds: [] },
      channelPerformance: [],
      spendSummary: [],
      summary: {},
      radiusCache: {},
      focusRequest: 0,
      theme: "light",
      popup: null,
      signalChart: null,
      channelChart: null,
      insightRows: [],
      spendRows: [],
      map: null,
      selected: null
    };

    const fmt = new Intl.NumberFormat("en-US");
    const shortFmt = new Intl.NumberFormat("en-US", { notation: "compact", maximumFractionDigits: 1 });
    const layerColors = {
      location: "#116d6e",
      lead: "#c6652b",
      enrollment: "#5a58a8",
      cluster: "#d14c47",
      spend: "#0f8f7d",
      pharmacy: "#287b4f"
    };
    const signalColors = {
      white_space_cluster: "#d14c47",
      conversion_gap_cluster: "#d97b1e",
      enrollment_pull_cluster: "#6f55b5",
      edge_market_cluster: "#2f7d8c",
      demand_cluster: "#58623f"
    };
    const actionColors = {
      scale_winner: "#0f8f7d",
      test_budget: "#2f7d8c",
      repair_roas: "#d14c47",
      fix_conversion: "#d97b1e",
      geo_expansion: "#6f55b5",
      monitor: "#58623f"
    };
    const embeddedMapboxToken = "__MAPBOX_PUBLIC_TOKEN__";

    const sql = {
      token: `
        SELECT value #>> '{}' AS mapbox_access_token
        FROM rvbbit.settings
        WHERE key = 'mapbox_public_token'
      `,
      locations: `
        SELECT
          location_id,
          title,
          course_type,
          status,
          city,
          state,
          zip,
          lat,
          lon,
          geocode_source,
          active_courses,
          enrolled_students,
          marketing_ready
        FROM marketing.geo_active_locations
        ORDER BY course_type, state, city, title
        LIMIT 1000
      `,
      leads: `
        SELECT
          zip,
          course_type,
          city,
          state,
          lat,
          lon,
          lead_count,
          lead_count_365d,
          converted_count,
          conversion_rate_pct,
          last_lead_date
        FROM marketing.geo_lead_origins_zip
        ORDER BY lead_count DESC
        LIMIT 900
      `,
      enrollments: `
        SELECT
          zip,
          course_type,
          city,
          state,
          lat,
          lon,
          enrollment_count,
          enrollment_count_365d,
          active_or_grad_count,
          last_enrolled_at
        FROM marketing.geo_enrollment_origins_zip
        ORDER BY enrollment_count DESC
        LIMIT 900
      `,
      clusters: `
        SELECT
          course_type,
          cluster_signal,
          cell_lat,
          cell_lon,
          lat,
          lon,
          zip_count,
          lead_count,
          lead_count_365d,
          converted_count,
          enrollment_count,
          enrollment_count_365d,
          nearest_matching_location_miles,
          demand_score,
          opportunity_score,
          white_space_zips,
          conversion_gap_zips,
          enrollment_pull_zips,
          edge_market_zips
        FROM marketing.geo_demand_clusters
        ORDER BY opportunity_score DESC
        LIMIT 900
      `,
      spendMarkets: `
        SELECT
          zip,
          course_type,
          city,
          state,
          lat,
          lon,
          primary_channel,
          primary_channel_key,
          cmo_action,
          paid_leads,
          allocated_spend,
          allocated_cpl,
          allocated_clicks,
          allocated_impressions,
          enrollment_count_365d,
          estimated_recent_revenue,
          roas_proxy,
          budget_index,
          cmo_priority_score,
          market_signal,
          opportunity_score,
          nearest_matching_location_title,
          nearest_matching_location_miles
        FROM marketing.geo_spend_roas_markets
        ORDER BY cmo_priority_score DESC
        LIMIT 900
      `,
      cloudSignals: `
        WITH signals AS (
          SELECT
            zip,
            course_type,
            city,
            state,
            lat,
            lon,
            primary_channel,
            cmo_action,
            paid_leads,
            allocated_spend,
            enrollment_count_365d,
            estimated_recent_revenue,
            roas_proxy,
            budget_index,
            opportunity_score,
            cmo_priority_score,
            CASE
              WHEN cmo_action IN ('scale_winner', 'test_budget', 'geo_expansion')
                OR (opportunity_score >= 500 AND COALESCE(budget_index, 0) < 0.8)
                THEN 'underfunded'
              WHEN cmo_action IN ('repair_roas', 'fix_conversion')
                OR (allocated_spend >= 500 AND COALESCE(roas_proxy, 0) < 1.5)
                THEN 'overspend'
              ELSE NULL
            END AS cloud_type,
            CASE
              WHEN cmo_action IN ('scale_winner', 'test_budget', 'geo_expansion')
                OR (opportunity_score >= 500 AND COALESCE(budget_index, 0) < 0.8)
                THEN GREATEST(cmo_priority_score, opportunity_score, 1)
              WHEN cmo_action IN ('repair_roas', 'fix_conversion')
                OR (allocated_spend >= 500 AND COALESCE(roas_proxy, 0) < 1.5)
                THEN GREATEST(allocated_spend, paid_leads * 25.0, 1)
              ELSE 0
            END AS cloud_weight
          FROM marketing.geo_spend_roas_markets
        ),
        ranked AS (
          SELECT
            *,
            row_number() OVER (PARTITION BY cloud_type ORDER BY cloud_weight DESC) AS cloud_rank
          FROM signals
          WHERE cloud_type IS NOT NULL
        )
        SELECT
          zip,
          course_type,
          city,
          state,
          lat,
          lon,
          primary_channel,
          cmo_action,
          paid_leads,
          allocated_spend,
          enrollment_count_365d,
          estimated_recent_revenue,
          roas_proxy,
          budget_index,
          opportunity_score,
          cmo_priority_score,
          cloud_type,
          cloud_weight
        FROM ranked
        WHERE cloud_rank <= 450
        ORDER BY cloud_type, cloud_weight DESC
        LIMIT 900
      `,
      cplCloudSignals: `
        WITH base AS (
          SELECT
            zip,
            course_type,
            city,
            state,
            lat,
            lon,
            primary_channel,
            paid_leads,
            allocated_spend,
            allocated_cpl,
            roas_proxy,
            cmo_action,
            cmo_priority_score
          FROM marketing.geo_spend_roas_markets
          WHERE allocated_cpl IS NOT NULL
            AND allocated_cpl > 0
            AND paid_leads >= 2
            AND allocated_spend > 0
        ),
        med AS (
          SELECT
            course_type,
            percentile_cont(0.5) WITHIN GROUP (ORDER BY allocated_cpl)::numeric AS median_cpl
          FROM base
          GROUP BY course_type
        ),
        signals AS (
          SELECT
            b.*,
            m.median_cpl,
            round((b.allocated_cpl / NULLIF(m.median_cpl, 0))::numeric, 2) AS cpl_index,
            CASE
              WHEN b.allocated_cpl <= m.median_cpl * 0.75 THEN 'below_median_cpl'
              WHEN b.allocated_cpl >= m.median_cpl * 1.35 THEN 'above_median_cpl'
              ELSE NULL
            END AS cpl_cloud_type,
            CASE
              WHEN b.allocated_cpl <= m.median_cpl * 0.75
                THEN GREATEST((m.median_cpl - b.allocated_cpl) * b.paid_leads, b.cmo_priority_score, 1)
              WHEN b.allocated_cpl >= m.median_cpl * 1.35
                THEN GREATEST((b.allocated_cpl - m.median_cpl) * b.paid_leads, b.allocated_spend, 1)
              ELSE 0
            END AS cpl_cloud_weight
          FROM base b
          JOIN med m ON m.course_type = b.course_type
        ),
        ranked AS (
          SELECT
            *,
            row_number() OVER (PARTITION BY cpl_cloud_type ORDER BY cpl_cloud_weight DESC) AS cpl_cloud_rank
          FROM signals
          WHERE cpl_cloud_type IS NOT NULL
        )
        SELECT
          zip,
          course_type,
          city,
          state,
          lat,
          lon,
          primary_channel,
          paid_leads,
          allocated_spend,
          allocated_cpl,
          median_cpl,
          cpl_index,
          roas_proxy,
          cmo_action,
          cmo_priority_score,
          cpl_cloud_type,
          cpl_cloud_weight
        FROM ranked
        WHERE cpl_cloud_rank <= 450
        ORDER BY cpl_cloud_type, cpl_cloud_weight DESC
        LIMIT 900
      `,
      channelPerformance: `
        SELECT
          channel,
          channel_key,
          spend,
          leads_submitted,
          students_enrolled,
          revenue_booked,
          roas,
          cac,
          cpl,
          lead_to_student_pct
        FROM marketing.marketing_channel_performance
        WHERE channel_key IN ('paid_social_meta', 'paid_social_tiktok', 'paid_search_google')
        ORDER BY spend DESC
      `,
      spendSummary: `
        SELECT
          course_type,
          cmo_action,
          markets,
          paid_leads,
          allocated_spend,
          enrollment_count_365d,
          estimated_recent_revenue,
          roas_proxy,
          cmo_priority_score
        FROM marketing.spend_roas_action_summary
        WHERE course_type IN ('all', 'dental', 'pharmacy')
        ORDER BY course_type, cmo_priority_score DESC
      `,
      summary: `
        WITH loc AS (
          SELECT 'all'::text AS course_type, count(*)::int AS active_locations
          FROM marketing.geo_active_locations
          UNION ALL
          SELECT course_type, count(*)::int AS active_locations
          FROM marketing.geo_active_locations
          GROUP BY course_type
        ),
        demand AS (
          SELECT
            'all'::text AS course_type,
            sum(lead_count)::int AS leads,
            sum(enrollment_count)::int AS enrollments,
            sum(demand_score)::numeric(18,2) AS demand_score
          FROM marketing.geo_demand_origins_zip
          UNION ALL
          SELECT
            course_type,
            sum(lead_count)::int AS leads,
            sum(enrollment_count)::int AS enrollments,
            sum(demand_score)::numeric(18,2) AS demand_score
          FROM marketing.geo_demand_origins_zip
          WHERE course_type IN ('dental', 'pharmacy')
          GROUP BY course_type
        ),
        signals AS (
          SELECT
            'all'::text AS course_type,
            count(*) FILTER (WHERE market_signal = 'white_space')::int AS white_space_zips,
            count(*) FILTER (WHERE market_signal = 'conversion_gap')::int AS conversion_gap_zips,
            count(*) FILTER (WHERE market_signal = 'enrollment_pull')::int AS enrollment_pull_zips,
            count(*) FILTER (WHERE market_signal = 'edge_market')::int AS edge_market_zips,
            sum(opportunity_score)::numeric(18,2) AS opportunity_score
          FROM marketing.geo_origin_opportunities
          UNION ALL
          SELECT
            course_type,
            count(*) FILTER (WHERE market_signal = 'white_space')::int AS white_space_zips,
            count(*) FILTER (WHERE market_signal = 'conversion_gap')::int AS conversion_gap_zips,
            count(*) FILTER (WHERE market_signal = 'enrollment_pull')::int AS enrollment_pull_zips,
            count(*) FILTER (WHERE market_signal = 'edge_market')::int AS edge_market_zips,
            sum(opportunity_score)::numeric(18,2) AS opportunity_score
          FROM marketing.geo_origin_opportunities
          WHERE course_type IN ('dental', 'pharmacy')
          GROUP BY course_type
        ),
        clusters AS (
          SELECT 'all'::text AS course_type, count(*)::int AS cluster_count
          FROM marketing.geo_demand_clusters
          UNION ALL
          SELECT course_type, count(*)::int AS cluster_count
          FROM marketing.geo_demand_clusters
          GROUP BY course_type
        )
        SELECT
          COALESCE(d.course_type, loc.course_type, signals.course_type, clusters.course_type) AS course_type,
          COALESCE(loc.active_locations, 0)::int AS active_locations,
          COALESCE(d.leads, 0)::int AS leads,
          COALESCE(d.enrollments, 0)::int AS enrollments,
          COALESCE(d.demand_score, 0)::numeric(18,2) AS demand_score,
          COALESCE(signals.opportunity_score, 0)::numeric(18,2) AS opportunity_score,
          COALESCE(signals.white_space_zips, 0)::int AS white_space_zips,
          COALESCE(signals.conversion_gap_zips, 0)::int AS conversion_gap_zips,
          COALESCE(signals.enrollment_pull_zips, 0)::int AS enrollment_pull_zips,
          COALESCE(signals.edge_market_zips, 0)::int AS edge_market_zips,
          COALESCE(clusters.cluster_count, 0)::int AS cluster_count
        FROM demand d
        FULL OUTER JOIN loc USING (course_type)
        FULL OUTER JOIN signals USING (course_type)
        FULL OUTER JOIN clusters USING (course_type)
        WHERE COALESCE(d.course_type, loc.course_type, signals.course_type, clusters.course_type) IN ('all', 'dental', 'pharmacy')
        ORDER BY course_type
      `
    };

    function showStatus(message) {
      const el = document.getElementById("status");
      el.textContent = message;
      el.classList.add("show");
    }

    function clearStatus() {
      const el = document.getElementById("status");
      el.textContent = "";
      el.classList.remove("show");
    }

    function configuredMapboxToken() {
      const token = window.MAPBOX_ACCESS_TOKEN || window.RVBBIT_MAPBOX_ACCESS_TOKEN || embeddedMapboxToken;
      return token && token !== "__MAPBOX_PUBLIC_TOKEN__" ? token : "";
    }

    async function waitForQueryBridge(ms = 8000) {
      const started = Date.now();
      while (Date.now() - started < ms) {
        if (typeof window.rvbbitQuery === "function") return window.rvbbitQuery;
        if (typeof window.__rvbbitQuery === "function") {
          window.rvbbitQuery = async (sqlText, opts) => window.__rvbbitQuery(sqlText, opts || {});
          return window.rvbbitQuery;
        }
        await new Promise((resolve) => setTimeout(resolve, 100));
      }
      throw new Error("rvbbitQuery bridge is unavailable");
    }

    async function queryRows(query) {
      const result = await window.rvbbitQuery(query);
      if (Array.isArray(result)) return result;
      if (result && result.error) {
        const message = result.error.message || result.error.code || JSON.stringify(result.error);
        throw new Error(message);
      }
      if (Array.isArray(result?.rows)) return result.rows;
      if (Array.isArray(result?.structuredContent?.rows)) return result.structuredContent.rows;
      if (Array.isArray(result?.data)) return result.data;
      return [];
    }

    function num(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function signalLabel(value) {
      return String(value || "demand_cluster").replace(/_/g, " ");
    }

    function actionLabel(value) {
      return String(value || "monitor").replace(/_/g, " ");
    }

    function styleForTheme(theme) {
      return theme === "dark" ? "mapbox://styles/mapbox/dark-v11" : "mapbox://styles/mapbox/light-v11";
    }

    function chartTextColor() {
      return getComputedStyle(document.body).getPropertyValue("--muted").trim() || "#66726c";
    }

    function chartGridColor() {
      return getComputedStyle(document.body).getPropertyValue("--line").trim() || "rgba(23, 33, 28, 0.14)";
    }

    function setTheme(theme, syncMap = true) {
      state.theme = theme === "dark" ? "dark" : "light";
      document.body.classList.toggle("dark", state.theme === "dark");
      document.documentElement.style.colorScheme = state.theme;
      try { localStorage.setItem("aaMarketMapTheme", state.theme); } catch (_) {}
      const button = document.getElementById("themeToggle");
      if (button) {
        button.textContent = state.theme === "dark" ? "Light" : "Dark";
        button.classList.toggle("active", state.theme === "dark");
        button.setAttribute("aria-pressed", state.theme === "dark" ? "true" : "false");
      }
      updateSignalChart();
      updateChannelChart();
      if (!syncMap || !state.map) return;
      state.map.setStyle(styleForTheme(state.theme));
      state.map.once("style.load", () => {
        addMapLayers(state.map);
        applyFilters();
        if (state.selected && state.map.getSource("radius")) {
          state.map.getSource("radius").setData(circlePolygon(state.selected, Number(document.getElementById("radiusMiles").value)));
        }
      });
    }

    function validPoint(row) {
      return Number.isFinite(num(row.lat)) && Number.isFinite(num(row.lon));
    }

    function featureCollection(rows, type) {
      return {
        type: "FeatureCollection",
        features: rows.filter(validPoint).map((row) => {
          const count = type === "location"
            ? Math.max(1, num(row.active_courses))
            : type === "lead"
              ? Math.max(1, num(row.lead_count))
              : type === "cluster"
                ? Math.max(1, num(row.opportunity_score))
                : type === "spend"
                  ? Math.max(1, num(row.cmo_priority_score))
                  : type === "cloud"
                    ? Math.max(1, num(row.cloud_weight))
                    : type === "cplCloud"
                      ? Math.max(1, num(row.cpl_cloud_weight))
                  : Math.max(1, num(row.enrollment_count));
          return {
            type: "Feature",
            geometry: { type: "Point", coordinates: [num(row.lon), num(row.lat)] },
            properties: { ...row, point_type: type, count }
          };
        })
      };
    }

    function applyFilters() {
      for (const key of Object.keys(state.raw)) {
        state.filtered[key] = state.raw[key].filter((row) => {
          const course = String(row.course_type || "unknown").toLowerCase();
          return state.course === "all" || course === state.course;
        });
      }

      if (state.map) {
        const map = state.map;
        if (map.getSource("locations")) map.getSource("locations").setData(featureCollection(state.filtered.locations, "location"));
        if (map.getSource("leads")) map.getSource("leads").setData(featureCollection(state.filtered.leads, "lead"));
        if (map.getSource("enrollments")) map.getSource("enrollments").setData(featureCollection(state.filtered.enrollments, "enrollment"));
        if (map.getSource("clusters")) map.getSource("clusters").setData(featureCollection(state.filtered.clusters, "cluster"));
        if (map.getSource("spend")) map.getSource("spend").setData(featureCollection(state.filtered.spend, "spend"));
        if (map.getSource("clouds")) map.getSource("clouds").setData(featureCollection(state.filtered.clouds, "cloud"));
        if (map.getSource("cplClouds")) map.getSource("cplClouds").setData(featureCollection(state.filtered.cplClouds, "cplCloud"));
        syncVisibility();
        if (state.selected) updateFocus(state.selected);
      }
      updateStats();
      updateInsights();
    }

    function syncVisibility() {
      const map = state.map;
      if (!map) return;
      const visibility = (on) => on ? "visible" : "none";
      for (const id of ["location-circles", "location-labels"]) {
        if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", visibility(state.layers.locations));
      }
      for (const id of ["lead-heat", "lead-circles"]) {
        if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", visibility(state.layers.leads));
      }
      for (const id of ["enrollment-heat", "enrollment-circles"]) {
        if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", visibility(state.layers.enrollments));
      }
      for (const id of ["cluster-circles", "cluster-labels"]) {
        if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", visibility(state.layers.clusters));
      }
      for (const id of ["spend-circles", "spend-labels"]) {
        if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", visibility(state.layers.spend));
      }
      for (const id of ["underfunded-clouds", "overspend-clouds"]) {
        if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", visibility(state.layers.clouds));
      }
      for (const id of ["low-cpl-clouds", "high-cpl-clouds"]) {
        if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", visibility(state.layers.cpl));
      }
    }

    function updateStats() {
      const summary = state.summary[state.course] || {};
      const locations = num(summary.active_locations) || state.filtered.locations.length;
      const leads = num(summary.leads) || state.filtered.leads.reduce((sum, row) => sum + num(row.lead_count), 0);
      const enrollments = num(summary.enrollments) || state.filtered.enrollments.reduce((sum, row) => sum + num(row.enrollment_count), 0);
      const opportunity = num(summary.opportunity_score);
      document.getElementById("statLocations").textContent = fmt.format(locations);
      document.getElementById("statLeads").textContent = fmt.format(leads);
      document.getElementById("statEnrollments").textContent = fmt.format(enrollments);
      document.getElementById("statOpportunity").textContent = fmt.format(Math.round(opportunity));
      document.getElementById("subtitle").textContent = `${fmt.format(locations)} active locations | ${fmt.format(num(summary.cluster_count))} demand clusters`;
    }

    function updateSignalChart() {
      const canvas = document.getElementById("signalChart");
      if (!canvas || typeof Chart === "undefined") return;
      const grouped = new Map();
      state.filtered.clusters.forEach((row) => {
        const key = row.cluster_signal || "demand_cluster";
        grouped.set(key, (grouped.get(key) || 0) + num(row.opportunity_score));
      });
      const entries = Array.from(grouped.entries()).sort((a, b) => b[1] - a[1]).slice(0, 5);
      const labels = entries.map(([key]) => signalLabel(key));
      const values = entries.map(([, value]) => Math.round(value));
      const colors = entries.map(([key]) => signalColors[key] || signalColors.demand_cluster);
      const textColor = chartTextColor();
      const gridColor = chartGridColor();
      if (!state.signalChart) {
        state.signalChart = new Chart(canvas, {
          type: "bar",
          data: {
            labels,
            datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }]
          },
          options: {
            indexAxis: "y",
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => shortFmt.format(ctx.raw || 0) } } },
            scales: {
              x: { ticks: { color: textColor, callback: (value) => shortFmt.format(value) }, grid: { color: gridColor } },
              y: { ticks: { color: textColor }, grid: { display: false } }
            }
          }
        });
      } else {
        state.signalChart.data.labels = labels;
        state.signalChart.data.datasets[0].data = values;
        state.signalChart.data.datasets[0].backgroundColor = colors;
        state.signalChart.options.scales.x.ticks.color = textColor;
        state.signalChart.options.scales.x.grid.color = gridColor;
        state.signalChart.options.scales.y.ticks.color = textColor;
        state.signalChart.update();
      }
    }

    function updateChannelChart() {
      const canvas = document.getElementById("channelChart");
      if (!canvas || typeof Chart === "undefined") return;
      const rows = state.channelPerformance || [];
      const labels = rows.map((row) => row.channel || row.channel_key || "Channel");
      const values = rows.map((row) => Math.round(num(row.spend)));
      const colors = ["#116d6e", "#c6652b", "#5a58a8"];
      const textColor = chartTextColor();
      const gridColor = chartGridColor();
      const tooltip = {
        callbacks: {
          label: (ctx) => {
            const row = rows[ctx.dataIndex] || {};
            return `$${shortFmt.format(num(row.spend))} spend | ${num(row.roas).toFixed(1)}x ROAS | $${fmt.format(Math.round(num(row.cac)))} CAC`;
          }
        }
      };
      if (!state.channelChart) {
        state.channelChart = new Chart(canvas, {
          type: "bar",
          data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
          options: {
            indexAxis: "y",
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: { legend: { display: false }, tooltip },
            scales: {
              x: { ticks: { color: textColor, callback: (value) => "$" + shortFmt.format(value) }, grid: { color: gridColor } },
              y: { ticks: { color: textColor }, grid: { display: false } }
            }
          }
        });
      } else {
        state.channelChart.data.labels = labels;
        state.channelChart.data.datasets[0].data = values;
        state.channelChart.data.datasets[0].backgroundColor = colors;
        state.channelChart.options.plugins.tooltip = tooltip;
        state.channelChart.options.scales.x.ticks.color = textColor;
        state.channelChart.options.scales.x.grid.color = gridColor;
        state.channelChart.options.scales.y.ticks.color = textColor;
        state.channelChart.update();
      }
    }

    function spendSummaryForCourse() {
      return (state.spendSummary || []).filter((row) => String(row.course_type || "all").toLowerCase() === state.course);
    }

    function updateSpendGrid() {
      const rows = state.filtered.spend
        .slice()
        .sort((a, b) => num(b.cmo_priority_score) - num(a.cmo_priority_score))
        .slice(0, 6);
      state.spendRows = rows;
      const spendRows = spendSummaryForCourse();
      const totalSpend = spendRows.reduce((sum, row) => sum + num(row.allocated_spend), 0);
      const totalRevenue = spendRows.reduce((sum, row) => sum + num(row.estimated_recent_revenue), 0);
      const meta = document.getElementById("spendMeta");
      if (meta) {
        const roas = totalSpend > 0 ? totalRevenue / totalSpend : 0;
        meta.textContent = `$${shortFmt.format(totalSpend)} allocated | ${roas.toFixed(1)}x ROAS | CPL blue low / amber high`;
      }
      updateChannelChart();
      const grid = document.getElementById("spendGrid");
      if (!grid) return;
      const body = rows.map((row, index) => `
        <button class="demand-row" type="button" data-spend-index="${index}">
          <span><span class="signal-chip" style="color:${esc(actionColors[row.cmo_action] || actionColors.monitor)}">${esc(actionLabel(row.cmo_action))}</span></span>
          <span>${esc(row.primary_channel || "Paid")}</span>
          <span>$${shortFmt.format(num(row.allocated_spend))}</span>
          <span>${num(row.roas_proxy).toFixed(1)}x</span>
          <span>${shortFmt.format(Math.round(num(row.cmo_priority_score)))}</span>
        </button>
      `).join("");
      grid.innerHTML = `
        <div class="demand-row header">
          <span>Action</span><span>Channel</span><span>Spend</span><span>ROAS</span><span>Score</span>
        </div>
        ${body || '<div class="demand-row header"><span>No spend markets</span><span></span><span></span><span></span><span></span></div>'}
      `;
      grid.querySelectorAll("[data-spend-index]").forEach((button) => {
        button.addEventListener("click", () => {
          const row = state.spendRows[Number(button.dataset.spendIndex)];
          if (!row || !state.map) return;
          state.map.flyTo({ center: [num(row.lon), num(row.lat)], zoom: Math.max(state.map.getZoom(), 6.5), duration: 650 });
          showSinglePopup(row, "spend", [num(row.lon), num(row.lat)]);
        });
      });
    }

    function updateInsights() {
      const rows = state.filtered.clusters
        .slice()
        .sort((a, b) => num(b.opportunity_score) - num(a.opportunity_score))
        .slice(0, 6);
      state.insightRows = rows;
      const meta = document.getElementById("insightsMeta");
      if (meta) {
        const label = state.course === "all" ? "all programs" : state.course;
        meta.textContent = `${fmt.format(state.filtered.clusters.length)} clusters | ${label}`;
      }
      updateSignalChart();
      const grid = document.getElementById("demandGrid");
      if (!grid) return;
      const body = rows.map((row, index) => `
        <button class="demand-row" type="button" data-index="${index}">
          <span><span class="signal-chip" style="color:${esc(signalColors[row.cluster_signal] || signalColors.demand_cluster)}">${esc(signalLabel(row.cluster_signal))}</span></span>
          <span>${fmt.format(num(row.zip_count))}</span>
          <span>${shortFmt.format(num(row.lead_count))}</span>
          <span>${shortFmt.format(num(row.enrollment_count))}</span>
          <span>${shortFmt.format(Math.round(num(row.opportunity_score)))}</span>
        </button>
      `).join("");
      grid.innerHTML = `
        <div class="demand-row header">
          <span>Signal</span><span>ZIPs</span><span>Leads</span><span>Enroll</span><span>Opp</span>
        </div>
        ${body || '<div class="demand-row header"><span>No clusters</span><span></span><span></span><span></span><span></span></div>'}
      `;
      grid.querySelectorAll("[data-index]").forEach((button) => {
        button.addEventListener("click", () => {
          const row = state.insightRows[Number(button.dataset.index)];
          if (!row || !state.map) return;
          state.map.flyTo({ center: [num(row.lon), num(row.lat)], zoom: Math.max(state.map.getZoom(), 6.2), duration: 650 });
          showSinglePopup(row, "cluster", [num(row.lon), num(row.lat)]);
        });
      });
      updateSpendGrid();
    }

    function milesBetween(a, b) {
      const r = 3958.7613;
      const toRad = (v) => v * Math.PI / 180;
      const lat1 = toRad(num(a.lat));
      const lat2 = toRad(num(b.lat));
      const dLat = lat2 - lat1;
      const dLon = toRad(num(b.lon) - num(a.lon));
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return 2 * r * Math.asin(Math.sqrt(h));
    }

    function circlePolygon(center, radiusMiles, points = 96) {
      const coords = [];
      const earth = 3958.7613;
      const lat = num(center.lat) * Math.PI / 180;
      const lon = num(center.lon) * Math.PI / 180;
      const angular = radiusMiles / earth;
      for (let i = 0; i <= points; i += 1) {
        const bearing = 2 * Math.PI * i / points;
        const lat2 = Math.asin(Math.sin(lat) * Math.cos(angular) + Math.cos(lat) * Math.sin(angular) * Math.cos(bearing));
        const lon2 = lon + Math.atan2(
          Math.sin(bearing) * Math.sin(angular) * Math.cos(lat),
          Math.cos(angular) - Math.sin(lat) * Math.sin(lat2)
        );
        coords.push([lon2 * 180 / Math.PI, lat2 * 180 / Math.PI]);
      }
      return { type: "FeatureCollection", features: [{ type: "Feature", geometry: { type: "Polygon", coordinates: [coords] }, properties: {} }] };
    }

    function quoteSql(value) {
      return `'${String(value ?? "").replace(/'/g, "''")}'`;
    }

    function radiusSummarySql(locationId, courseScope) {
      return `
        SELECT
          location_id,
          course_scope,
          radius_miles,
          demand_zip_count,
          lead_count,
          lead_count_365d,
          converted_count,
          enrollment_count,
          enrollment_count_365d,
          lead_to_enrollment_rate_pct,
          demand_score,
          opportunity_score,
          white_space_zips,
          conversion_gap_zips,
          enrollment_pull_zips,
          edge_market_zips
        FROM marketing.location_radius_summary
        WHERE location_id = ${quoteSql(locationId)}
          AND course_scope = ${quoteSql(courseScope)}
        ORDER BY radius_miles
      `;
    }

    async function getRadiusSummary(location) {
      const scope = state.course;
      const key = `${location.location_id || ""}:${scope}`;
      if (!state.radiusCache[key]) {
        state.radiusCache[key] = queryRows(radiusSummarySql(location.location_id, scope));
      }
      return state.radiusCache[key];
    }

    async function updateFocus(location) {
      state.selected = location;
      const requestId = ++state.focusRequest;
      const radius = Number(document.getElementById("radiusMiles").value);
      document.getElementById("focusTitle").textContent = location.title || "Location";
      document.getElementById("focusMeta").textContent = [
        [location.city, location.state].filter(Boolean).join(", "),
        String(location.course_type || "").toUpperCase(),
        `${radius} mi`,
        "Loading"
      ].filter(Boolean).join(" | ");
      document.getElementById("focusCourses").textContent = fmt.format(num(location.active_courses));
      document.getElementById("focusLeads").textContent = "0";
      document.getElementById("focusEnrollments").textContent = "0";
      document.getElementById("focusOpportunity").textContent = "0";
      if (state.map && state.map.getSource("radius")) {
        state.map.getSource("radius").setData(circlePolygon(location, radius));
      }

      try {
        const rows = await getRadiusSummary(location);
        if (requestId !== state.focusRequest) return;
        const row = rows.find((item) => num(item.radius_miles) === radius) || {};
        const signalBits = [
          `${fmt.format(num(row.demand_zip_count))} zips`,
          num(row.white_space_zips) ? `${fmt.format(num(row.white_space_zips))} white-space` : "",
          num(row.conversion_gap_zips) ? `${fmt.format(num(row.conversion_gap_zips))} conversion gaps` : "",
          num(row.enrollment_pull_zips) ? `${fmt.format(num(row.enrollment_pull_zips))} enrollment pull` : "",
          num(row.edge_market_zips) ? `${fmt.format(num(row.edge_market_zips))} edge markets` : ""
        ].filter(Boolean);
        document.getElementById("focusMeta").textContent = [
          [location.city, location.state].filter(Boolean).join(", "),
          String(location.course_type || "").toUpperCase(),
          `${radius} mi`,
          signalBits.join(" | ")
        ].filter(Boolean).join(" | ");
        document.getElementById("focusLeads").textContent = fmt.format(num(row.lead_count));
        document.getElementById("focusEnrollments").textContent = fmt.format(num(row.enrollment_count));
        document.getElementById("focusOpportunity").textContent = fmt.format(Math.round(num(row.opportunity_score)));
      } catch (error) {
        if (requestId !== state.focusRequest) return;
        document.getElementById("focusMeta").textContent = error instanceof Error ? error.message : String(error);
      }
    }

    function popupHeading(type) {
      if (type === "location") return "Location";
      if (type === "cluster") return "Demand cluster";
      if (type === "lead") return "Lead origin";
      if (type === "spend") return "Spend action";
      if (type === "cloud") return "Budget cloud";
      if (type === "cplCloud") return "Median CPL cloud";
      return "Enrollment origin";
    }

    function popupHtml(props) {
      if (props.point_type === "location") {
        return `<div class="popup-title">${esc(props.title || "Location")}</div>
          <div class="popup-meta">${esc([props.city, props.state].filter(Boolean).join(", "))}<br>
          ${esc(String(props.course_type || "").toUpperCase())} | ${fmt.format(num(props.active_courses))} active courses | ${fmt.format(num(props.enrolled_students))} students</div>`;
      }
      if (props.point_type === "lead") {
        return `<div class="popup-title">${esc(props.city || props.zip || "Lead origin")}</div>
          <div class="popup-meta">${esc([props.state, props.zip].filter(Boolean).join(" "))}<br>
          ${esc(String(props.course_type || "unknown").toUpperCase())} | ${fmt.format(num(props.lead_count))} leads | ${fmt.format(num(props.converted_count))} converted</div>`;
      }
      if (props.point_type === "cluster") {
        return `<div class="popup-title">${esc(signalLabel(props.cluster_signal))}</div>
          <div class="popup-meta">${esc(String(props.course_type || "").toUpperCase())} | ${fmt.format(num(props.zip_count))} ZIPs<br>
          ${fmt.format(num(props.lead_count))} leads | ${fmt.format(num(props.enrollment_count))} enrollments | ${fmt.format(Math.round(num(props.opportunity_score)))} opp</div>`;
      }
      if (props.point_type === "spend") {
        return `<div class="popup-title">${esc(actionLabel(props.cmo_action))}</div>
          <div class="popup-meta">${esc([props.city, props.state, props.zip].filter(Boolean).join(" "))}<br>
          ${esc(props.primary_channel || "Paid media")} | $${shortFmt.format(num(props.allocated_spend))} spend | ${num(props.roas_proxy).toFixed(1)}x ROAS proxy<br>
          ${shortFmt.format(num(props.paid_leads))} paid leads | ${fmt.format(num(props.enrollment_count_365d))} recent enrollments</div>`;
      }
      if (props.point_type === "cloud") {
        return `<div class="popup-title">${esc(props.cloud_type === "overspend" ? "Overspend / repair cloud" : "Underfunded opportunity cloud")}</div>
          <div class="popup-meta">${esc([props.city, props.state, props.zip].filter(Boolean).join(" "))}<br>
          ${esc(actionLabel(props.cmo_action))} | ${esc(props.primary_channel || "Paid media")} | $${shortFmt.format(num(props.allocated_spend))} spend<br>
          ${num(props.roas_proxy).toFixed(1)}x ROAS proxy | ${shortFmt.format(Math.round(num(props.cloud_weight)))} cloud weight</div>`;
      }
      if (props.point_type === "cplCloud") {
        return `<div class="popup-title">${esc(props.cpl_cloud_type === "above_median_cpl" ? "Above-median CPL cloud" : "Below-median CPL cloud")}</div>
          <div class="popup-meta">${esc([props.city, props.state, props.zip].filter(Boolean).join(" "))}<br>
          ${esc(props.primary_channel || "Paid media")} | $${fmt.format(Math.round(num(props.allocated_cpl)))} CPL | $${fmt.format(Math.round(num(props.median_cpl)))} median<br>
          ${num(props.cpl_index).toFixed(2)}x median | ${shortFmt.format(num(props.paid_leads))} paid leads</div>`;
      }
      return `<div class="popup-title">${esc(props.city || props.zip || "Enrollment origin")}</div>
        <div class="popup-meta">${esc([props.state, props.zip].filter(Boolean).join(" "))}<br>
        ${esc(String(props.course_type || "unknown").toUpperCase())} | ${fmt.format(num(props.enrollment_count))} enrollments</div>`;
    }

    function popupItemHtml(props) {
      return `<div class="popup-item">
        <div class="popup-kicker">${esc(popupHeading(props.point_type))}</div>
        ${popupHtml(props)}
      </div>`;
    }

    function popupStackHtml(features) {
      const count = features.length;
      return `<div class="popup-stack">
        <div>
          <div class="popup-title">${count === 1 ? "1 record" : `${count} records`}</div>
          <div class="popup-meta">Sorted by map hierarchy</div>
        </div>
        ${features.map((feature) => popupItemHtml(feature.properties || {})).join("")}
      </div>`;
    }

    function showPopup(html, lngLat) {
      if (state.popup) state.popup.remove();
      state.popup = new mapboxgl.Popup({ closeButton: true, maxWidth: "360px" })
        .setLngLat(lngLat)
        .setHTML(html)
        .addTo(state.map);
    }

    function showSinglePopup(row, type, lngLat) {
      showPopup(popupStackHtml([{ properties: { ...row, point_type: type } }]), lngLat);
    }

    function featureKey(feature) {
      const props = feature.properties || {};
      const type = props.point_type || "unknown";
      return [
        type,
        props.location_id || props.zip || props.cell_lat || "",
        props.course_type || "",
        props.cluster_signal || ""
      ].join("|");
    }

    function showFeatureStack(event) {
      const layers = ["location-circles", "spend-circles", "low-cpl-clouds", "high-cpl-clouds", "underfunded-clouds", "overspend-clouds", "cluster-circles", "lead-circles", "enrollment-circles"]
        .filter((layer) => state.map.getLayer(layer) && state.map.getLayoutProperty(layer, "visibility") !== "none");
      const rawFeatures = state.map.queryRenderedFeatures(event.point, { layers });
      if (!rawFeatures.length) return;
      const rank = { location: 0, spend: 1, cplCloud: 2, cloud: 3, cluster: 4, lead: 5, enrollment: 6 };
      const seen = new Set();
      const features = rawFeatures
        .filter((feature) => {
          const key = featureKey(feature);
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => (rank[(a.properties || {}).point_type] ?? 9) - (rank[(b.properties || {}).point_type] ?? 9))
        .slice(0, 8);
      showPopup(popupStackHtml(features), event.lngLat);
      const location = features.find((feature) => (feature.properties || {}).point_type === "location");
      if (location) {
        updateFocus({
          ...(location.properties || {}),
          lat: location.geometry.coordinates[1],
          lon: location.geometry.coordinates[0]
        });
      }
    }

    function addMapLayers(map) {
      if (map.getSource("locations")) return;
      map.addSource("locations", { type: "geojson", data: featureCollection([], "location") });
      map.addSource("leads", { type: "geojson", data: featureCollection([], "lead") });
      map.addSource("enrollments", { type: "geojson", data: featureCollection([], "enrollment") });
      map.addSource("clusters", { type: "geojson", data: featureCollection([], "cluster") });
      map.addSource("spend", { type: "geojson", data: featureCollection([], "spend") });
      map.addSource("clouds", { type: "geojson", data: featureCollection([], "cloud") });
      map.addSource("cplClouds", { type: "geojson", data: featureCollection([], "cplCloud") });
      map.addSource("radius", { type: "geojson", data: { type: "FeatureCollection", features: [] } });

      map.addLayer({
        id: "low-cpl-clouds",
        type: "heatmap",
        source: "cplClouds",
        filter: ["==", ["get", "cpl_cloud_type"], "below_median_cpl"],
        paint: {
          "heatmap-weight": ["interpolate", ["linear"], ["get", "count"], 1, 0.12, 100, 0.45, 500, 0.9],
          "heatmap-intensity": ["interpolate", ["linear"], ["zoom"], 3, 0.75, 7, 1.55, 10, 2.0],
          "heatmap-color": [
            "interpolate", ["linear"], ["heatmap-density"],
            0, "rgba(47,125,140,0)",
            0.25, "rgba(47,125,140,0.20)",
            0.6, "rgba(15,143,125,0.42)",
            1, "rgba(15,143,125,0.66)"
          ],
          "heatmap-radius": ["interpolate", ["linear"], ["zoom"], 3, 38, 6, 82, 9, 146],
          "heatmap-opacity": 0.78
        }
      });

      map.addLayer({
        id: "high-cpl-clouds",
        type: "heatmap",
        source: "cplClouds",
        filter: ["==", ["get", "cpl_cloud_type"], "above_median_cpl"],
        paint: {
          "heatmap-weight": ["interpolate", ["linear"], ["get", "count"], 1, 0.12, 100, 0.48, 500, 0.95],
          "heatmap-intensity": ["interpolate", ["linear"], ["zoom"], 3, 0.75, 7, 1.6, 10, 2.05],
          "heatmap-color": [
            "interpolate", ["linear"], ["heatmap-density"],
            0, "rgba(217,123,30,0)",
            0.25, "rgba(217,123,30,0.22)",
            0.6, "rgba(217,123,30,0.46)",
            1, "rgba(209,76,71,0.68)"
          ],
          "heatmap-radius": ["interpolate", ["linear"], ["zoom"], 3, 38, 6, 82, 9, 146],
          "heatmap-opacity": 0.78
        }
      });

      map.addLayer({
        id: "underfunded-clouds",
        type: "heatmap",
        source: "clouds",
        filter: ["==", ["get", "cloud_type"], "underfunded"],
        paint: {
          "heatmap-weight": ["interpolate", ["linear"], ["get", "count"], 1, 0.08, 250, 0.45, 1000, 0.9],
          "heatmap-intensity": ["interpolate", ["linear"], ["zoom"], 3, 0.85, 7, 1.8, 10, 2.3],
          "heatmap-color": [
            "interpolate", ["linear"], ["heatmap-density"],
            0, "rgba(15,143,125,0)",
            0.2, "rgba(15,143,125,0.20)",
            0.55, "rgba(15,143,125,0.42)",
            1, "rgba(15,143,125,0.68)"
          ],
          "heatmap-radius": ["interpolate", ["linear"], ["zoom"], 3, 46, 6, 96, 9, 170],
          "heatmap-opacity": 0.82
        }
      });

      map.addLayer({
        id: "overspend-clouds",
        type: "heatmap",
        source: "clouds",
        filter: ["==", ["get", "cloud_type"], "overspend"],
        paint: {
          "heatmap-weight": ["interpolate", ["linear"], ["get", "count"], 1, 0.1, 500, 0.52, 2000, 0.95],
          "heatmap-intensity": ["interpolate", ["linear"], ["zoom"], 3, 0.75, 7, 1.65, 10, 2.1],
          "heatmap-color": [
            "interpolate", ["linear"], ["heatmap-density"],
            0, "rgba(209,76,71,0)",
            0.2, "rgba(209,76,71,0.22)",
            0.6, "rgba(217,123,30,0.44)",
            1, "rgba(209,76,71,0.70)"
          ],
          "heatmap-radius": ["interpolate", ["linear"], ["zoom"], 3, 42, 6, 88, 9, 154],
          "heatmap-opacity": 0.82
        }
      });

      map.addLayer({
        id: "lead-heat",
        type: "heatmap",
        source: "leads",
        paint: {
          "heatmap-weight": ["interpolate", ["linear"], ["get", "count"], 1, 0.05, 250, 0.8],
          "heatmap-intensity": ["interpolate", ["linear"], ["zoom"], 3, 0.7, 9, 1.6],
          "heatmap-color": ["interpolate", ["linear"], ["heatmap-density"], 0, "rgba(198,101,43,0)", 0.4, "rgba(198,101,43,0.45)", 1, "rgba(198,101,43,0.9)"],
          "heatmap-radius": ["interpolate", ["linear"], ["zoom"], 3, 18, 9, 34],
          "heatmap-opacity": 0.62
        }
      });

      map.addLayer({
        id: "enrollment-heat",
        type: "heatmap",
        source: "enrollments",
        paint: {
          "heatmap-weight": ["interpolate", ["linear"], ["get", "count"], 1, 0.04, 180, 0.85],
          "heatmap-intensity": ["interpolate", ["linear"], ["zoom"], 3, 0.55, 9, 1.4],
          "heatmap-color": ["interpolate", ["linear"], ["heatmap-density"], 0, "rgba(90,88,168,0)", 0.45, "rgba(90,88,168,0.42)", 1, "rgba(90,88,168,0.86)"],
          "heatmap-radius": ["interpolate", ["linear"], ["zoom"], 3, 16, 9, 32],
          "heatmap-opacity": 0.58
        }
      });

      map.addLayer({
        id: "radius-fill",
        type: "fill",
        source: "radius",
        paint: { "fill-color": "#116d6e", "fill-opacity": 0.09 }
      });

      map.addLayer({
        id: "radius-line",
        type: "line",
        source: "radius",
        paint: { "line-color": "#116d6e", "line-width": 2, "line-opacity": 0.72 }
      });

      map.addLayer({
        id: "lead-circles",
        type: "circle",
        source: "leads",
        minzoom: 5,
        paint: {
          "circle-color": layerColors.lead,
          "circle-opacity": 0.68,
          "circle-radius": ["interpolate", ["linear"], ["get", "count"], 1, 4, 25, 8, 100, 13, 250, 18],
          "circle-stroke-color": "#fff",
          "circle-stroke-width": 1
        }
      });

      map.addLayer({
        id: "enrollment-circles",
        type: "circle",
        source: "enrollments",
        minzoom: 5,
        paint: {
          "circle-color": layerColors.enrollment,
          "circle-opacity": 0.66,
          "circle-radius": ["interpolate", ["linear"], ["get", "count"], 1, 4, 20, 8, 75, 13, 160, 17],
          "circle-stroke-color": "#fff",
          "circle-stroke-width": 1
        }
      });

      map.addLayer({
        id: "cluster-circles",
        type: "circle",
        source: "clusters",
        paint: {
          "circle-color": [
            "match",
            ["get", "cluster_signal"],
            "white_space_cluster", "#d14c47",
            "conversion_gap_cluster", "#d97b1e",
            "enrollment_pull_cluster", "#6f55b5",
            "edge_market_cluster", "#2f7d8c",
            "#58623f"
          ],
          "circle-opacity": 0.72,
          "circle-radius": ["interpolate", ["linear"], ["get", "count"], 1, 6, 100, 11, 1000, 20, 5000, 32],
          "circle-stroke-color": "#fff",
          "circle-stroke-width": 1.5
        }
      });

      map.addLayer({
        id: "cluster-labels",
        type: "symbol",
        source: "clusters",
        minzoom: 5.5,
        layout: {
          "text-field": ["to-string", ["get", "zip_count"]],
          "text-size": 10,
          "text-allow-overlap": false
        },
        paint: {
          "text-color": "#ffffff",
          "text-halo-color": "rgba(23, 33, 28, 0.22)",
          "text-halo-width": 1
        }
      });

      map.addLayer({
        id: "spend-circles",
        type: "circle",
        source: "spend",
        paint: {
          "circle-color": [
            "match",
            ["get", "cmo_action"],
            "scale_winner", actionColors.scale_winner,
            "test_budget", actionColors.test_budget,
            "repair_roas", actionColors.repair_roas,
            "fix_conversion", actionColors.fix_conversion,
            "geo_expansion", actionColors.geo_expansion,
            actionColors.monitor
          ],
          "circle-opacity": 0.74,
          "circle-radius": ["interpolate", ["linear"], ["get", "count"], 1, 5, 100, 10, 500, 17, 1000, 25],
          "circle-stroke-color": "#ffffff",
          "circle-stroke-width": 2.5
        }
      });

      map.addLayer({
        id: "spend-labels",
        type: "symbol",
        source: "spend",
        minzoom: 6,
        layout: {
          "text-field": ["case", ["has", "roas_proxy"], ["concat", ["to-string", ["round", ["get", "roas_proxy"]]], "x"], ""],
          "text-size": 10,
          "text-allow-overlap": false
        },
        paint: {
          "text-color": "#ffffff",
          "text-halo-color": "rgba(23, 33, 28, 0.32)",
          "text-halo-width": 1
        }
      });

      map.addLayer({
        id: "location-circles",
        type: "circle",
        source: "locations",
        paint: {
          "circle-color": ["case", ["==", ["get", "course_type"], "pharmacy"], layerColors.pharmacy, layerColors.location],
          "circle-radius": ["interpolate", ["linear"], ["get", "active_courses"], 0, 7, 4, 13, 12, 20],
          "circle-stroke-color": "#fff",
          "circle-stroke-width": 2,
          "circle-opacity": 0.94
        }
      });

      map.addLayer({
        id: "location-labels",
        type: "symbol",
        source: "locations",
        minzoom: 7,
        layout: {
          "text-field": ["get", "title"],
          "text-size": 11,
          "text-offset": [0, 1.25],
          "text-anchor": "top"
        },
        paint: {
          "text-color": "#17211c",
          "text-halo-color": "#ffffff",
          "text-halo-width": 1.5
        }
      });
    }

    function bindInteractions(map) {
      for (const layer of ["location-circles", "lead-circles", "enrollment-circles", "cluster-circles", "spend-circles"]) {
        map.on("mouseenter", layer, () => { map.getCanvas().style.cursor = "pointer"; });
        map.on("mouseleave", layer, () => { map.getCanvas().style.cursor = ""; });
      }
      map.on("click", showFeatureStack);

      document.querySelectorAll("[data-course]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("[data-course]").forEach((b) => b.classList.remove("active"));
          button.classList.add("active");
          state.course = button.dataset.course || "all";
          applyFilters();
        });
      });

      document.querySelectorAll("[data-layer]").forEach((button) => {
        button.addEventListener("click", () => {
          const layer = button.dataset.layer;
          state.layers[layer] = !state.layers[layer];
          button.classList.toggle("active", state.layers[layer]);
          syncVisibility();
        });
      });

      document.getElementById("radiusMiles").addEventListener("change", () => {
        if (state.selected) updateFocus(state.selected);
      });

      const themeButton = document.getElementById("themeToggle");
      if (themeButton) {
        themeButton.addEventListener("click", () => {
          setTheme(state.theme === "dark" ? "light" : "dark", true);
        });
      }
    }

    function fitToData(map) {
      const bounds = new mapboxgl.LngLatBounds();
      let hasPoint = false;
      state.filtered.locations.forEach((row) => {
        if (!validPoint(row)) return;
        bounds.extend([num(row.lon), num(row.lat)]);
        hasPoint = true;
      });
      if (hasPoint) map.fitBounds(bounds, { padding: 92, duration: 0, maxZoom: 7 });
    }

    async function init() {
      try {
        await waitForQueryBridge();
        let initialTheme = "light";
        try {
          initialTheme = localStorage.getItem("aaMarketMapTheme")
            || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        } catch (_) {}
        setTheme(initialTheme, false);

        let token = configuredMapboxToken();
        if (!token) {
          const tokenRows = await queryRows(sql.token);
          token = tokenRows[0] && tokenRows[0].mapbox_access_token;
        }
        if (!token) throw new Error("Mapbox token not found");

        mapboxgl.accessToken = token;
        const map = new mapboxgl.Map({
          container: "map",
          style: styleForTheme(state.theme),
          center: [-92.5, 36.8],
          zoom: 4.2,
          attributionControl: true
        });
        state.map = map;
        map.addControl(new mapboxgl.NavigationControl({ visualizePitch: true }), "bottom-right");

        const mapLoaded = new Promise((resolve) => {
          if (map.loaded()) resolve();
          else map.once("load", resolve);
        });
        const dataLoaded = Promise.all([
          queryRows(sql.locations),
          queryRows(sql.leads),
          queryRows(sql.enrollments),
          queryRows(sql.clusters),
          queryRows(sql.spendMarkets),
          queryRows(sql.cloudSignals),
          queryRows(sql.cplCloudSignals),
          queryRows(sql.channelPerformance),
          queryRows(sql.spendSummary),
          queryRows(sql.summary)
        ]);
        const [, [locations, leads, enrollments, clusters, spendMarkets, cloudSignals, cplCloudSignals, channelPerformance, spendSummary, summaryRows]] = await Promise.all([mapLoaded, dataLoaded]);
        state.raw.locations = locations;
        state.raw.leads = leads;
        state.raw.enrollments = enrollments;
        state.raw.clusters = clusters;
        state.raw.spend = spendMarkets;
        state.raw.clouds = cloudSignals;
        state.raw.cplClouds = cplCloudSignals;
        state.channelPerformance = channelPerformance;
        state.spendSummary = spendSummary;
        state.summary = {};
        summaryRows.forEach((row) => {
          state.summary[String(row.course_type || "all").toLowerCase()] = row;
        });

        addMapLayers(map);
        bindInteractions(map);
        applyFilters();
        fitToData(map);
        clearStatus();
      } catch (error) {
        showStatus(error instanceof Error ? error.message : String(error));
      }
    }

    init();
  </script>
</body>
</html>
