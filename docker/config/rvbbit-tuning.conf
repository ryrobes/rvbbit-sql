# rvbbit Postgres tuning — used as the primary postgresql.conf via
# `-c config_file=/etc/rvbbit/tuning.conf` from docker-compose. Sized
# for an analytics workload on a single box. Override any setting with
# `-c key=value` on the postgres command line (last value wins) or by
# editing this file and rebuilding the image.
#
# Because we're the primary config file (not an include), we need to
# carry the few things the postgres image normally injects into the
# data-dir postgresql.conf — listen_addresses is the only one that
# matters in practice.
#
# Settings are grouped by category. Each group notes the vanilla PG
# default (PG18) so the rationale is visible.

# ----- connections --------------------------------------------------------
# Image-equivalent: postgres:18's entrypoint normally writes
# listen_addresses = '*' into the data-dir conf. Since we replace
# that conf with this one, we set it here.
listen_addresses = '*'
# Sidecar-backed analytical routes can briefly use one PG client for the
# frontend backend and another from the Duck sidecar. Keep enough headroom
# for concurrency/load harnesses without requiring per-run overrides.
max_connections = 300

# ----- extension preload --------------------------------------------------
# rvbbit's TAM, custom-scan hook, and planner hook all register from
# _PG_init, which only runs when the .so is preloaded. pg_cron's background
# worker also starts at preload (the Scheduler UI manages it).
shared_preload_libraries = 'pg_rvbbit,pg_cron'

# pg_cron's job table + background worker live in exactly ONE home database, and
# cron.* (cron.schedule etc.) is only callable there. We use 'postgres' — always
# present, never dropped — so scheduling is decoupled from any app database and works
# across multiple rvbbit databases. Jobs run against the real database via
# cron.schedule_in_database(name, sched, cmd, '<db>'); the Scheduler UI does this.
# Trade-off: cron.job_run_details then lives in 'postgres' while rvbbit.receipts lives
# in the target db, so per-run cost rollups span two databases.
cron.database_name = 'postgres'

# ----- memory -------------------------------------------------------------
# PG18 defaults: shared_buffers=128MB, work_mem=4MB,
# maintenance_work_mem=64MB. Analytics queries with hash aggregates,
# sorts, and bitmap scans need much more per-operator memory.
shared_buffers = 1GB
work_mem = 64MB
maintenance_work_mem = 256MB
max_wal_size = 4GB

# ----- planner cost model ------------------------------------------------
# PG defaults assume spinning rust (random_page_cost=4.0). NVMe / SSD
# random access is comparable to sequential — lower this so the planner
# picks index/bitmap paths when they win.
random_page_cost = 1.1
effective_cache_size = 4GB
# Larger statistics samples = better plan choices on skewed columns,
# at modest ANALYZE cost. ClickBench-style data is highly skewed.
default_statistics_target = 200

# ----- parallel query ----------------------------------------------------
# Vanilla PG ships conservative parallel-query pools. Bumping these
# helps heap-side parallel scans, parallel sort/hash aggregates, and
# leaves headroom for rvbbit's future parallel-aware CustomScan.
#
# rvbbit's CustomScan is currently single-threaded — the df_inprocess
# route gets its parallelism from DataFusion's tokio runtime, not from
# PG workers. These knobs still matter because:
#   * heap-side queries and post-CustomScan steps (sort, group, gather
#     across row groups via PG's parallel append) use them
#   * any extension that does parallel scans (pgvector, etc.) shares
#     the same pool
max_worker_processes = 32
max_parallel_workers = 16
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# ----- async I/O (PG18+) -------------------------------------------------
# PG18 introduced AIO with a worker-thread fallback. `io_method=worker`
# is the safe default (always available). Switch to `io_uring` if the
# host kernel supports it and you want lower overhead.
#
# `io_workers` and `effective_io_concurrency` drive how many concurrent
# I/O operations PG will submit. Defaults (3 / 1) assume spinning rust.
# For NVMe and especially for cold-tier object store reads, raise both.
io_method = worker
io_workers = 16
effective_io_concurrency = 64
maintenance_io_concurrency = 16

# ----- logging ------------------------------------------------------------
# Helpful when debugging bench runs; harmless on production runs.
log_min_duration_statement = 5000  # log queries > 5s
log_lock_waits = on
log_temp_files = 0                 # log any spill to temp file
