name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test storage + warren crates
        run: cargo test -p rvbbit_storage -p warren-agent

  e2e-acceleration:
    name: E2E acceleration suite (published image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start rvbbit + heap Postgres
        run: |
          docker network create citest
          docker run -d --name ci-rvbbit --network citest -p 55599:5432 \
            -e POSTGRES_PASSWORD=rvbbit -e POSTGRES_DB=bench \
            ghcr.io/ryrobes/rvbbit-postgres:latest
          docker run -d --name ci-heap --network citest -p 55598:5432 \
            -e POSTGRES_PASSWORD=rvbbit -e POSTGRES_DB=bench \
            postgres:18
          for i in $(seq 1 90); do
            docker exec ci-rvbbit pg_isready -U postgres -q 2>/dev/null && break
            sleep 2
          done
          docker exec ci-rvbbit psql -U postgres -d bench \
            -c "CREATE EXTENSION IF NOT EXISTS pg_rvbbit;" \
            -c "SELECT rvbbit.rvbbit_version();"
          for i in $(seq 1 60); do
            docker exec ci-heap pg_isready -U postgres -q 2>/dev/null && break
            sleep 2
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install -q pytest "psycopg[binary]" pyarrow

      # Two tests are deselected: they need path parity between the test
      # runner and the Postgres container's filesystem (/rvbbit_import direct
      # parquet import) that only the dev bench container provides. They run
      # locally via `make test`.
      - name: Run acceleration E2E suite
        env:
          RVBBIT_DSN: postgresql://postgres:rvbbit@localhost:55599/bench
          HEAP_DSN: postgresql://postgres:rvbbit@localhost:55598/bench
        run: |
          pytest -v -p no:cacheprovider \
            tests/test_acceleration_dirty_ops.py \
            tests/test_acceleration_observability.py \
            tests/test_acceleration_tombstone_overlay.py \
            tests/test_acceleration_production_edges.py \
            tests/test_acceleration_auto_consolidation.py \
            --deselect tests/test_acceleration_observability.py::test_direct_canonical_parquet_import_uses_threaded_writer_and_logs_timing \
            --deselect tests/test_acceleration_auto_consolidation.py::test_rebuild_stages_fold_and_defers_old_file_reap

      - name: Stack logs on failure
        if: failure()
        run: docker logs ci-rvbbit 2>&1 | tail -100
